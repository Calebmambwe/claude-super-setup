# Web App Stack Template — "Lovable Clone"
# Next.js 16 + TypeScript + Tailwind + shadcn/ui CLI v4 + Supabase

name: web-app
description: "Next.js 16 + TypeScript + Tailwind + shadcn/ui CLI v4 + Supabase"
short_label: "web"

init_commands:
  - "pnpm create next-app . --typescript --tailwind --eslint --app --src-dir --import-alias '@/*' --yes"
  - "pnpm add @supabase/supabase-js @supabase/ssr zod framer-motion lucide-react next-themes @phosphor-icons/react @tabler/icons-react @formkit/auto-animate"
  - "pnpm add -D vitest @vitejs/plugin-react @testing-library/react @testing-library/jest-dom jsdom prettier @next/bundle-analyzer prettier-plugin-tailwindcss tailwindcss-motion"
  - "pnpm dlx shadcn@latest init -y"
  - "pnpm dlx skills add shadcn/ui"
  - "npx @next/codemod@latest agents-md"

directories:
  - src/app
  - src/components/ui
  - src/components/shared
  - src/components/sections
  - src/lib
  - src/hooks
  - src/types
  - src/actions
  - src/providers
  - src/__tests__

starter_files:
  src/lib/env.ts: |
    import { z } from "zod";

    const envSchema = z.object({
      NEXT_PUBLIC_SUPABASE_URL: z.string().url(),
      NEXT_PUBLIC_SUPABASE_ANON_KEY: z.string().min(1),
    });

    export const env = envSchema.parse({
      NEXT_PUBLIC_SUPABASE_URL: process.env.NEXT_PUBLIC_SUPABASE_URL,
      NEXT_PUBLIC_SUPABASE_ANON_KEY: process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY,
    });

  src/lib/supabase/client.ts: |
    import { createBrowserClient } from "@supabase/ssr";
    import { env } from "../env";

    export function createClient() {
      return createBrowserClient(
        env.NEXT_PUBLIC_SUPABASE_URL,
        env.NEXT_PUBLIC_SUPABASE_ANON_KEY,
      );
    }

  src/lib/supabase/server.ts: |
    import { createServerClient } from "@supabase/ssr";
    import { cookies } from "next/headers";
    import { env } from "../env";

    export async function createClient() {
      const cookieStore = await cookies();
      return createServerClient(
        env.NEXT_PUBLIC_SUPABASE_URL,
        env.NEXT_PUBLIC_SUPABASE_ANON_KEY,
        {
          cookies: {
            getAll() {
              return cookieStore.getAll();
            },
            setAll(cookiesToSet) {
              for (const { name, value, options } of cookiesToSet) {
                cookieStore.set(name, value, options);
              }
            },
          },
        },
      );
    }

  src/types/database.ts: |
    // Generate with: pnpm supabase gen types typescript --project-id <id> > src/types/database.ts
    export type Database = Record<string, never>;

  vitest.config.ts: |
    import { defineConfig } from "vitest/config";
    import react from "@vitejs/plugin-react";
    import path from "path";

    export default defineConfig({
      plugins: [react()],
      test: {
        environment: "jsdom",
        setupFiles: ["./src/__tests__/setup.ts"],
        include: ["src/**/*.{test,spec}.{ts,tsx}"],
      },
      resolve: {
        alias: {
          "@": path.resolve(__dirname, "./src"),
        },
      },
    });

  src/lib/animations.ts: |
    export const fadeInUp = {
      hidden: { opacity: 0, y: 20 },
      visible: { opacity: 1, y: 0, transition: { duration: 0.5 } },
    };

    export const fadeInDown = {
      hidden: { opacity: 0, y: -20 },
      visible: { opacity: 1, y: 0, transition: { duration: 0.5 } },
    };

    export const scaleIn = {
      hidden: { opacity: 0, scale: 0.95 },
      visible: { opacity: 1, scale: 1, transition: { duration: 0.4 } },
    };

    export const staggerContainer = {
      hidden: {},
      visible: { transition: { staggerChildren: 0.1 } },
    };

  src/providers/theme-provider.tsx: |
    "use client";

    import { ThemeProvider as NextThemesProvider } from "next-themes";

    export function ThemeProvider({ children }: { children: React.ReactNode }) {
      return (
        <NextThemesProvider attribute="class" defaultTheme="dark" enableSystem disableTransitionOnChange>
          {children}
        </NextThemesProvider>
      );
    }

  src/app/error.tsx: |
    "use client";

    import { Button } from "@/components/ui/button";

    export default function Error({ error, reset }: { error: Error; reset: () => void }) {
      return (
        <div className="flex min-h-[50vh] flex-col items-center justify-center gap-4 text-center">
          <h2 className="font-heading text-2xl font-bold">Something went wrong</h2>
          <p className="text-muted-foreground max-w-md">{error.message || "An unexpected error occurred."}</p>
          <Button onClick={reset}>Try again</Button>
        </div>
      );
    }

  src/app/not-found.tsx: |
    import { Button } from "@/components/ui/button";
    import Link from "next/link";

    export default function NotFound() {
      return (
        <div className="flex min-h-[50vh] flex-col items-center justify-center gap-4 text-center">
          <h2 className="font-heading text-4xl font-bold">404</h2>
          <p className="text-muted-foreground max-w-md">The page you're looking for doesn't exist.</p>
          <Button asChild><Link href="/">Go Home</Link></Button>
        </div>
      );
    }

  src/app/loading.tsx: |
    export default function Loading() {
      return (
        <div className="flex min-h-[50vh] items-center justify-center">
          <div className="space-y-4 w-full max-w-2xl px-4">
            <div className="h-8 w-48 animate-pulse rounded bg-muted/50" />
            <div className="h-4 w-full animate-pulse rounded bg-muted/50" />
            <div className="h-4 w-3/4 animate-pulse rounded bg-muted/50" />
            <div className="grid grid-cols-3 gap-4 mt-8">
              <div className="h-32 animate-pulse rounded-xl bg-muted/50" />
              <div className="h-32 animate-pulse rounded-xl bg-muted/50" />
              <div className="h-32 animate-pulse rounded-xl bg-muted/50" />
            </div>
          </div>
        </div>
      );
    }

  prettier.config.js: |
    module.exports = {
      plugins: ["prettier-plugin-tailwindcss"],
    };

  src/__tests__/setup.ts: |
    import "@testing-library/jest-dom/vitest";

  src/__tests__/smoke.test.tsx: |
    import { describe, it, expect } from "vitest";

    describe("Smoke test", () => {
      it("should pass", () => {
        expect(true).toBe(true);
      });
    });

commands:
  dev: "pnpm dev"
  test: "pnpm exec vitest run"
  build: "pnpm build"
  lint: "pnpm lint"
  typecheck: "pnpm exec tsc --noEmit"
  format: "pnpm exec prettier --write ."

package_json_scripts:
  test: "vitest run"
  typecheck: "tsc --noEmit"

env_example: |
  NEXT_PUBLIC_SUPABASE_URL=https://your-project.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key

gitignore_extra: |
  .env
  .env*.local
  .vercel

ci_files:
  ".github/workflows/ci.yml":
    content: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        check:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                node-version-file: '.nvmrc'
                cache: 'pnpm'
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm typecheck
            - run: pnpm test -- --run
            - run: pnpm build
  ".devcontainer/devcontainer.json":
    content: |
      {
        "name": "Dev Container",
        "image": "mcr.microsoft.com/devcontainers/typescript-node:22",
        "features": {
          "ghcr.io/devcontainers/features/github-cli:1": {}
        },
        "postCreateCommand": "pnpm install",
        "customizations": {
          "vscode": {
            "extensions": ["dbaeumer.vscode-eslint", "esbenp.prettier-vscode"]
          }
        }
      }

claude_md: |
  # CLAUDE.md

  ## Project
  - Stack: Next.js 15 + TypeScript + Tailwind CSS + shadcn/ui + Supabase
  - Styling: Tailwind CSS utility classes only. Use shadcn/ui components from src/components/ui.

  ## Commands
  - Dev: `pnpm dev`
  - Test: `pnpm exec vitest run`
  - Single test: `pnpm exec vitest run src/__tests__/file.test.tsx`
  - Build: `pnpm build`
  - Lint: `pnpm lint`
  - Typecheck: `pnpm exec tsc --noEmit`

  ## Architecture
  - `src/app/` — Next.js App Router pages, layouts, loading.tsx, error.tsx, not-found.tsx
  - `src/components/ui/` — shadcn/ui primitives (do not edit directly)
  - `src/components/shared/` — reusable app components
  - `src/components/sections/` — page sections (hero, features, pricing)
  - `src/lib/` — utilities, Supabase clients, animations.ts
  - `src/providers/` — context providers (theme-provider.tsx)
  - `src/hooks/` — custom React hooks
  - `src/types/` — TypeScript types and database types
  - `src/actions/` — Next.js Server Actions

  ## Conventions
  - Server components by default; add "use client" only when needed (state, effects, browser APIs)
  - Use Server Actions for mutations, not API routes
  - Supabase client: use `src/lib/supabase/server.ts` in server components, `src/lib/supabase/client.ts` in client components
  - NEVER use `any` type — use `unknown` + type guard
  - NEVER hardcode colors or spacing — use design system tokens
  - Use Framer Motion for scroll-reveal animations (variants in src/lib/animations.ts)
  - Use lucide-react for icons — import individually, never barrel import
  - Use next-themes for dark/light mode via src/providers/theme-provider.tsx
  - Use next/image for ALL images — never raw <img> tags
  - Every page must have error.tsx, loading.tsx siblings for error/loading states

agents_md: |
  # AGENTS.md

  ## Stack
  - Framework: Next.js 15 (App Router)
  - Language: TypeScript (strict)
  - Styling: Tailwind CSS + shadcn/ui
  - Backend: Supabase (auth, database, storage)
  - Testing: Vitest + React Testing Library

  ## Patterns & Conventions
  - Server components are default; "use client" only for interactivity
  - Use Server Actions for data mutations
  - Supabase server client: create per-request in server components
  - shadcn/ui components live in src/components/ui/ — don't modify them directly
  - Server Actions live in src/actions/ — use for data mutations

  ## Gotchas
  - cookies() is async in Next.js 15 — must await it
  - Supabase client MUST be created per-request in server components (no module-level singleton)
  - shadcn/ui init may modify tailwind.config.ts — commit before running

  ## Resolved Issues
