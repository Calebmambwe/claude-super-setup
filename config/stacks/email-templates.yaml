      firstName: string;
      loginUrl: string;
      appName: string;
    }

    export function WelcomeEmail({ firstName, loginUrl, appName }: WelcomeEmailProps) {
      return (
        <Html>
          <Head />
          <Preview>Welcome to {appName} — let's get you started</Preview>
          <Body style={main}>
            <Container style={container}>
              <Heading style={h1}>Welcome, {firstName}!</Heading>
              <Text style={text}>
                Thanks for signing up for {appName}. We're excited to have you on board.
              </Text>
              <Section style={buttonContainer}>
                <Button href={loginUrl} style={button}>
                  Get started
                </Button>
              </Section>
              <Hr style={hr} />
              <Text style={footer}>
                If you didn't create an account, you can safely ignore this email. If you have
