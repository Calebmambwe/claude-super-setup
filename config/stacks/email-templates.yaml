name: email-templates
description: "React Email + Resend + TypeScript preview server"
short_label: "email"

init_commands:
  - "pnpm init"
  - "pnpm add react-email @react-email/components resend"
  - "pnpm add -D typescript @types/react"

directories:
  - emails
  - components
  - lib
  - preview

starter_files:
  emails/welcome.tsx: |
    import { Html, Head, Body, Container, Section, Text, Button, Hr, Img } from '@react-email/components';

    interface WelcomeEmailProps {
      userName: string;
      appName?: string;
    }

    export default function WelcomeEmail({ userName, appName = 'Our App' }: WelcomeEmailProps) {
      return (
        <Html>
          <Head />
          <Body style={{ backgroundColor: '#f6f9fc', fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }}>
            <Container style={{ maxWidth: '600px', margin: '0 auto', padding: '20px' }}>
              <Section style={{ backgroundColor: '#ffffff', borderRadius: '8px', padding: '40px' }}>
                <Text style={{ fontSize: '24px', fontWeight: 'bold', color: '#1a1a1a' }}>
                  Welcome to {appName}!
                </Text>
                <Text style={{ fontSize: '16px', color: '#4a5568', lineHeight: '24px' }}>
                  Hi {userName}, we're excited to have you on board.
                </Text>
                <Button
                  href="https://example.com/dashboard"
                  style={{ backgroundColor: '#5B5BD6', color: '#ffffff', padding: '12px 24px', borderRadius: '6px', textDecoration: 'none', fontSize: '14px', fontWeight: '600' }}
                >
                  Get Started
                </Button>
                <Hr style={{ borderColor: '#e2e8f0', margin: '24px 0' }} />
                <Text style={{ fontSize: '12px', color: '#a0aec0' }}>
                  If you didn't create an account, you can safely ignore this email.
                </Text>
              </Section>
            </Container>
          </Body>
        </Html>
      );
    }

  emails/magic-link.tsx: |
    import { Html, Head, Body, Container, Section, Text, Button, Hr } from '@react-email/components';

    interface MagicLinkEmailProps {
      magicLink: string;
      expiresIn?: string;
    }

    export default function MagicLinkEmail({ magicLink, expiresIn = '10 minutes' }: MagicLinkEmailProps) {
      return (
        <Html>
          <Head />
          <Body style={{ backgroundColor: '#f6f9fc', fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }}>
            <Container style={{ maxWidth: '600px', margin: '0 auto', padding: '20px' }}>
              <Section style={{ backgroundColor: '#ffffff', borderRadius: '8px', padding: '40px' }}>
                <Text style={{ fontSize: '24px', fontWeight: 'bold', color: '#1a1a1a' }}>
                  Sign in to your account
                </Text>
                <Text style={{ fontSize: '16px', color: '#4a5568', lineHeight: '24px' }}>
                  Click the button below to sign in. This link expires in {expiresIn}.
                </Text>
                <Button
                  href={magicLink}
                  style={{ backgroundColor: '#5B5BD6', color: '#ffffff', padding: '12px 24px', borderRadius: '6px', textDecoration: 'none', fontSize: '14px', fontWeight: '600' }}
                >
                  Sign In
                </Button>
                <Hr style={{ borderColor: '#e2e8f0', margin: '24px 0' }} />
                <Text style={{ fontSize: '12px', color: '#a0aec0' }}>
                  If you didn't request this, you can safely ignore this email.
                </Text>
              </Section>
            </Container>
          </Body>
        </Html>
      );
    }

  lib/send.ts: |
    import { Resend } from 'resend';
    import { render } from '@react-email/render';
    import type { ComponentType } from 'react';

    const resend = new Resend(process.env.RESEND_API_KEY);

    export async function sendEmail<T extends Record<string, unknown>>({
      to,
      subject,
      template: Template,
      props,
    }: {
      to: string;
      subject: string;
      template: ComponentType<T>;
      props: T;
    }) {
      const html = await render(Template(props));
      return resend.emails.send({
        from: process.env.EMAIL_FROM || 'noreply@example.com',
        to,
        subject,
        html,
      });
    }

  package.json: |
    {
      "name": "email-templates",
      "private": true,
      "scripts": {
        "email:dev": "email dev --port 3000",
        "email:build": "email build",
        "email:export": "email export --outDir out"
      }
    }

  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "es2020",
        "module": "esnext",
        "moduleResolution": "bundler",
        "jsx": "react-jsx",
        "strict": true,
        "esModuleInterop": true,
        "skipLibCheck": true
      },
      "include": ["emails/**/*", "components/**/*", "lib/**/*"]
    }

ci_files:
  ".github/workflows/ci.yml":
    content: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        check:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                node-version: '22'
                cache: 'pnpm'
            - run: pnpm install --frozen-lockfile
            - run: pnpm exec tsc --noEmit
            - run: pnpm email:build

claude_md: |
  # CLAUDE.md
  ## Project
  - Stack: React Email + Resend + TypeScript
  - Run preview: `pnpm email:dev`
  - Build: `pnpm email:build`
  - Export HTML: `pnpm email:export`
  ## Conventions
  - All email templates in `emails/` directory
  - Shared components in `components/`
  - Use inline styles (email clients don't support CSS classes)
  - Test all emails in preview server before sending
