# Email Templates Stack Template
# React Email + Resend for transactional email templates

name: email-templates
description: "React Email + Resend for transactional email templates with TypeScript and local preview server"
short_label: "email"
category: "backend"
stack:
  - "React Email"
  - "Resend"
  - "TypeScript"
  - "Vitest"

init_commands:
  - "pnpm init -y"
  - "pnpm add react-email @react-email/components resend"
  - "pnpm add -D typescript vitest @types/node tsx"
  - "pnpm exec tsc --init --module NodeNext --moduleResolution NodeNext --target ES2022 --strict --outDir dist --rootDir src"

dependencies:
  - react-email
  - "@react-email/components"
  - resend

dev_dependencies:
  - typescript
  - vitest
  - "@types/node"
  - tsx

directories:
  - emails
  - src/lib

