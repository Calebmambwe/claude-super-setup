# Monorepo Stack Template
# Turborepo + Next.js 15 (web) + Hono + Drizzle (api) + Shared packages

name: monorepo
description: "Turborepo + Next.js 15 (web) + Hono + Drizzle + PostgreSQL (api) + shared packages"
short_label: "monorepo"

init_commands:
  - "pnpm dlx create-turbo@latest . --package-manager pnpm"
  - "pnpm add -w -D typescript prettier eslint @typescript-eslint/eslint-plugin @typescript-eslint/parser turbo"
  - "cd apps/web && pnpm add @supabase/supabase-js @supabase/ssr zod framer-motion lucide-react next-themes && pnpm add -D vitest @vitejs/plugin-react @testing-library/react @testing-library/jest-dom jsdom"
  - "cd apps/web && pnpm dlx shadcn@latest init -y"
  - "cd apps/api && pnpm add hono @hono/node-server drizzle-orm postgres dotenv zod && pnpm add -D tsx vitest drizzle-kit"

directories:
  - apps/web/src/app
  - apps/web/src/components/ui
  - apps/web/src/components/shared
  - apps/web/src/lib
  - apps/web/src/types
  - apps/web/src/__tests__
  - apps/api/src/routes
  - apps/api/src/services
  - apps/api/src/db
  - apps/api/src/types
  - apps/api/src/__tests__
  - packages/shared/src
  - packages/ui/src
  - packages/config/eslint
  - packages/config/typescript

starter_files:
  turbo.json: |
    {
      "$schema": "https://turbo.build/schema.json",
      "ui": "tui",
      "tasks": {
        "build": {
          "dependsOn": ["^build"],
          "inputs": ["$TURBO_DEFAULT$", ".env*"],
          "outputs": [".next/**", "!.next/cache/**", "dist/**"]
        },
        "lint": {
          "dependsOn": ["^lint"]
        },
        "typecheck": {
          "dependsOn": ["^typecheck"]
        },
        "test": {
          "dependsOn": ["^build"],
          "inputs": ["$TURBO_DEFAULT$"]
        },
        "dev": {
          "cache": false,
          "persistent": true
        }
      }
    }

  package.json: |
    {
      "name": "monorepo",
      "private": true,
      "packageManager": "pnpm@9.0.0",
      "workspaces": [
        "apps/*",
        "packages/*"
      ],
      "scripts": {
        "dev": "turbo dev",
        "build": "turbo build",
        "lint": "turbo lint",
        "typecheck": "turbo typecheck",
        "test": "turbo test",
        "format": "prettier --write ."
      },
      "devDependencies": {
        "prettier": "^3.0.0",
        "turbo": "latest",
        "typescript": "^5.0.0"
      }
    }

  pnpm-workspace.yaml: |
    packages:
      - "apps/*"
      - "packages/*"

  apps/web/package.json: |
    {
      "name": "@repo/web",
      "version": "0.1.0",
      "private": true,
      "scripts": {
        "dev": "next dev",
        "build": "next build",
        "start": "next start",
        "lint": "next lint",
        "typecheck": "tsc --noEmit",
        "test": "vitest run"
      },
      "dependencies": {
        "@repo/shared": "workspace:*",
        "@repo/ui": "workspace:*",
        "@supabase/supabase-js": "^2.0.0",
        "@supabase/ssr": "^0.5.0",
        "framer-motion": "^11.0.0",
        "lucide-react": "^0.400.0",
        "next": "15.0.0",
        "next-themes": "^0.3.0",
        "react": "^19.0.0",
        "react-dom": "^19.0.0",
        "zod": "^3.0.0"
      },
      "devDependencies": {
        "@repo/config": "workspace:*",
        "@testing-library/jest-dom": "^6.0.0",
        "@testing-library/react": "^16.0.0",
        "@vitejs/plugin-react": "^4.0.0",
        "@types/node": "^22.0.0",
        "@types/react": "^19.0.0",
        "@types/react-dom": "^19.0.0",
        "jsdom": "^25.0.0",
        "typescript": "^5.0.0",
        "vitest": "^2.0.0"
      }
    }

  apps/web/next.config.ts: |
    import type { NextConfig } from "next";

    const nextConfig: NextConfig = {
      transpilePackages: ["@repo/ui", "@repo/shared"],
    };

    export default nextConfig;

  apps/web/tsconfig.json: |
    {
      "extends": "@repo/config/typescript/nextjs.json",
      "compilerOptions": {
        "plugins": [{ "name": "next" }],
        "paths": {
          "@/*": ["./src/*"]
        }
      },
      "include": ["next-env.d.ts", "**/*.ts", "**/*.tsx", ".next/types/**/*.ts"],
      "exclude": ["node_modules"]
    }

  apps/web/src/lib/env.ts: |
    import { z } from "zod";

    const envSchema = z.object({
      NEXT_PUBLIC_SUPABASE_URL: z.string().url(),
      NEXT_PUBLIC_SUPABASE_ANON_KEY: z.string().min(1),
    });

    export const env = envSchema.parse({
      NEXT_PUBLIC_SUPABASE_URL: process.env.NEXT_PUBLIC_SUPABASE_URL,
      NEXT_PUBLIC_SUPABASE_ANON_KEY: process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY,
    });

  apps/web/src/__tests__/smoke.test.tsx: |
    import { describe, it, expect } from "vitest";

    describe("Smoke test", () => {
      it("should pass", () => {
        expect(true).toBe(true);
      });
    });

  apps/api/package.json: |
    {
      "name": "@repo/api",
      "version": "0.1.0",
      "private": true,
      "scripts": {
        "dev": "tsx watch src/index.ts",
        "build": "tsc",
        "start": "node dist/index.js",
        "lint": "eslint src/",
        "typecheck": "tsc --noEmit",
        "test": "vitest run",
        "db:generate": "drizzle-kit generate",
        "db:migrate": "drizzle-kit migrate"
      },
      "dependencies": {
        "@repo/shared": "workspace:*",
        "@hono/node-server": "^1.0.0",
        "drizzle-orm": "^0.36.0",
        "dotenv": "^16.0.0",
        "hono": "^4.0.0",
        "postgres": "^3.0.0",
        "zod": "^3.0.0"
      },
      "devDependencies": {
        "@repo/config": "workspace:*",
        "@types/node": "^22.0.0",
        "drizzle-kit": "^0.28.0",
        "tsx": "^4.0.0",
        "typescript": "^5.0.0",
        "vitest": "^2.0.0"
      }
    }

  apps/api/src/index.ts: |
    import { serve } from "@hono/node-server";
    import { app } from "./app";

    const port = Number(process.env.PORT) || 3001;
    console.log(`API running on http://localhost:${port}`);
    serve({ fetch: app.fetch, port });

  apps/api/src/app.ts: |
    import { Hono } from "hono";
    import { cors } from "hono/cors";
    import { logger } from "hono/logger";

    export const app = new Hono();

    app.use("*", logger());
    app.use("*", cors({
      origin: process.env.CORS_ORIGIN || "http://localhost:3000",
      allowMethods: ["GET", "POST", "PUT", "DELETE", "PATCH"],
      allowHeaders: ["Content-Type", "Authorization"],
    }));

    app.get("/health", (c) => c.json({ success: true, data: { status: "ok" }, error: null }));

  apps/api/src/__tests__/health.test.ts: |
    import { describe, it, expect } from "vitest";
    import { app } from "../app";

    describe("GET /health", () => {
      it("returns ok status", async () => {
        const res = await app.request("/health");
        expect(res.status).toBe(200);
        const body = await res.json();
        expect(body.success).toBe(true);
        expect(body.data.status).toBe("ok");
      });
    });

  packages/shared/package.json: |
    {
      "name": "@repo/shared",
      "version": "0.1.0",
      "private": true,
      "main": "./src/index.ts",
      "types": "./src/index.ts",
      "scripts": {
        "typecheck": "tsc --noEmit",
        "lint": "eslint src/"
      },
      "devDependencies": {
        "@repo/config": "workspace:*",
        "typescript": "^5.0.0"
      }
    }

  packages/shared/src/types.ts: |
    // Shared TypeScript types used across web and api packages

    export interface ApiResponse<T> {
      success: boolean;
      data: T | null;
      error: string | null;
      meta?: Record<string, unknown>;
    }

    export interface PaginationMeta {
      page: number;
      pageSize: number;
      total: number;
      totalPages: number;
    }

    export interface User {
      id: string;
      email: string;
      createdAt: string;
      updatedAt: string;
    }

  packages/shared/src/index.ts: |
    export * from "./types";

  packages/ui/package.json: |
    {
      "name": "@repo/ui",
      "version": "0.1.0",
      "private": true,
      "main": "./src/index.ts",
      "types": "./src/index.ts",
      "scripts": {
        "typecheck": "tsc --noEmit",
        "lint": "eslint src/"
      },
      "peerDependencies": {
        "react": "^19.0.0"
      },
      "devDependencies": {
        "@repo/config": "workspace:*",
        "@types/react": "^19.0.0",
        "typescript": "^5.0.0"
      }
    }

  packages/ui/src/button.tsx: |
    import * as React from "react";

    interface ButtonProps extends React.ButtonHTMLAttributes<HTMLButtonElement> {
      variant?: "primary" | "secondary" | "ghost";
      size?: "sm" | "md" | "lg";
      children: React.ReactNode;
    }

    export function Button({ variant = "primary", size = "md", className = "", children, ...props }: ButtonProps) {
      const variants: Record<string, string> = {
        primary: "bg-blue-600 text-white hover:bg-blue-700",
        secondary: "bg-gray-200 text-gray-900 hover:bg-gray-300",
        ghost: "bg-transparent text-gray-700 hover:bg-gray-100",
      };
      const sizes: Record<string, string> = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-4 py-2 text-base",
        lg: "px-6 py-3 text-lg",
      };

      return (
        <button
          className={`inline-flex items-center justify-center rounded-md font-medium transition-colors focus-visible:outline-none disabled:opacity-50 ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    }

  packages/ui/src/index.ts: |
    export * from "./button";

  packages/config/package.json: |
    {
      "name": "@repo/config",
      "version": "0.1.0",
      "private": true,
      "exports": {
        "./eslint/base": "./eslint/base.js",
        "./eslint/nextjs": "./eslint/nextjs.js",
        "./typescript/base.json": "./typescript/base.json",
        "./typescript/nextjs.json": "./typescript/nextjs.json"
      }
    }

  packages/config/typescript/base.json: |
    {
      "$schema": "https://json.schemastore.org/tsconfig",
      "compilerOptions": {
        "target": "es2022",
        "lib": ["es2022"],
        "module": "esnext",
        "moduleResolution": "bundler",
        "strict": true,
        "esModuleInterop": true,
        "skipLibCheck": true,
        "forceConsistentCasingInFileNames": true,
        "resolveJsonModule": true,
        "declaration": true,
        "declarationMap": true,
        "sourceMap": true
      },
      "exclude": ["node_modules"]
    }

  packages/config/typescript/nextjs.json: |
    {
      "$schema": "https://json.schemastore.org/tsconfig",
      "extends": "./base.json",
      "compilerOptions": {
        "target": "es2017",
        "lib": ["dom", "dom.iterable", "esnext"],
        "module": "esnext",
        "moduleResolution": "bundler",
        "jsx": "preserve",
        "incremental": true,
        "noEmit": true
      }
    }

  packages/config/eslint/base.js: |
    /** @type {import("eslint").Linter.Config} */
    module.exports = {
      extends: [
        "eslint:recommended",
        "plugin:@typescript-eslint/recommended",
      ],
      plugins: ["@typescript-eslint"],
      parser: "@typescript-eslint/parser",
      rules: {
        "@typescript-eslint/no-explicit-any": "error",
        "@typescript-eslint/no-unused-vars": ["error", { argsIgnorePattern: "^_" }],
      },
    };

  packages/config/eslint/nextjs.js: |
    /** @type {import("eslint").Linter.Config} */
    module.exports = {
      extends: ["./base.js", "next/core-web-vitals", "next/typescript"],
    };

ci_files:
  ".github/workflows/ci.yml":
    content: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        check:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                node-version-file: '.nvmrc'
                cache: 'pnpm'
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm typecheck
            - run: pnpm test
            - run: pnpm build
  ".devcontainer/devcontainer.json":
    content: |
      {
        "name": "Dev Container",
        "image": "mcr.microsoft.com/devcontainers/typescript-node:22",
        "features": {
          "ghcr.io/devcontainers/features/github-cli:1": {}
        },
        "postCreateCommand": "pnpm install",
        "customizations": {
          "vscode": {
            "extensions": ["dbaeumer.vscode-eslint", "esbenp.prettier-vscode"]
          }
        }
      }

commands:
  dev: "pnpm dev"
  build: "pnpm build"
  test: "pnpm test"
  lint: "pnpm lint"
  typecheck: "pnpm typecheck"
  format: "pnpm exec prettier --write ."
  dev_web: "turbo dev --filter=@repo/web"
  dev_api: "turbo dev --filter=@repo/api"
  build_web: "turbo build --filter=@repo/web"
  build_api: "turbo build --filter=@repo/api"

env_example: |
  # apps/web/.env.local
  NEXT_PUBLIC_SUPABASE_URL=https://your-project.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key

  # apps/api/.env
  PORT=3001
  DATABASE_URL=postgresql://user:password@localhost:5432/dbname
  CORS_ORIGIN=http://localhost:3000

gitignore_extra: |
  .env
  .env*.local
  .vercel
  .turbo
  dist/

claude_md: |
  # CLAUDE.md

  ## Project
  - Stack: Turborepo monorepo — Next.js 15 (web) + Hono + Drizzle + PostgreSQL (api) + shared packages
  - Package manager: pnpm workspaces

  ## Commands
  - Dev (all): `pnpm dev`
  - Dev (web only): `turbo dev --filter=@repo/web`
  - Dev (api only): `turbo dev --filter=@repo/api`
  - Build: `pnpm build`
  - Test: `pnpm test`
  - Lint: `pnpm lint`
  - Typecheck: `pnpm typecheck`
  - Format: `pnpm exec prettier --write .`

  ## Architecture
  - `apps/web/` — Next.js 15 App Router frontend
  - `apps/api/` — Hono API server with Drizzle ORM
  - `packages/shared/` — TypeScript types and utility functions shared across apps
  - `packages/ui/` — Shared shadcn-compatible React components
  - `packages/config/` — ESLint and TypeScript configs shared across packages
  - `turbo.json` — Pipeline: build, lint, test, typecheck tasks with dependency graph

  ## Conventions
  - All packages are referenced as `@repo/<name>` workspace packages
  - Shared types live in `packages/shared/src/types.ts` — import from `@repo/shared`
  - Shared UI components live in `packages/ui/src/` — import from `@repo/ui`
  - Turbo caches build outputs in `.turbo/` — never commit that directory
  - Run `turbo build --filter=@repo/<name>` to build a single package
  - NEVER use `any` type — use `unknown` + type guard

agents_md: |
  # AGENTS.md

  ## Stack
  - Build system: Turborepo (task orchestration + caching)
  - Package manager: pnpm workspaces
  - apps/web: Next.js 15 (App Router) + shadcn/ui + Supabase
  - apps/api: Hono + Drizzle ORM + PostgreSQL
  - packages/shared: TypeScript types + utilities
  - packages/ui: Shared React components
  - packages/config: ESLint + TypeScript base configs
  - Testing: Vitest (both apps)

  ## Patterns & Conventions
  - Packages use `workspace:*` references — never relative paths between packages
  - Shared types: define in `packages/shared/src/types.ts`, import from `@repo/shared`
  - Turbo pipeline: `build` depends on `^build` (packages build before apps)
  - Add new shadcn components to apps/web only; promote to packages/ui only if used in 2+ apps
  - API responses use `{ success, data, error }` envelope (defined in @repo/shared)

  ## Gotchas
  - `turbo.json` task definitions control caching — changing inputs/outputs invalidates cache
  - pnpm workspace protocol: use `workspace:*` not `*` for inter-package dependencies
  - TypeScript path aliases per-package — don't share tsconfig paths across package boundaries
  - Running `pnpm install` from root installs all workspace packages in one lockfile
  - Turbo filters: `--filter=@repo/web` runs tasks only for web and its dependencies
  - next.config.ts must list workspace packages in `transpilePackages` for proper bundling

  ## Resolved Issues
