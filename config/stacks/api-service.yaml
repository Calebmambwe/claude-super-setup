# API Service Stack Template
# Hono + TypeScript + Drizzle ORM + PostgreSQL

name: api-service
description: "Hono + TypeScript + Drizzle ORM + PostgreSQL"
short_label: "api"

init_commands:
  - "pnpm init"
  - "pnpm add hono @hono/node-server drizzle-orm postgres dotenv zod"
  - "pnpm add -D typescript @types/node tsx vitest drizzle-kit prettier eslint @typescript-eslint/eslint-plugin @typescript-eslint/parser"
  - "pnpm install"

directories:
  - src/routes
  - src/services
  - src/repositories
  - src/middleware
  - src/db
  - src/types
  - src/__tests__

starter_files:
  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "es2022",
        "module": "nodenext",
        "moduleResolution": "nodenext",
        "outDir": "dist",
        "rootDir": "src",
        "strict": true,
        "esModuleInterop": true,
        "skipLibCheck": true,
        "forceConsistentCasingInFileNames": true,
        "resolveJsonModule": true,
        "declaration": true
      },
      "include": ["src"],
      "exclude": ["node_modules", "dist"]
    }

  src/lib/env.ts: |
    import { z } from "zod";

    const envSchema = z.object({
      PORT: z.coerce.number().default(3000),
      DATABASE_URL: z.string().url(),
    });

    export const env = envSchema.parse(process.env);

  src/index.ts: |
    import { serve } from "@hono/node-server";
    import { app } from "./app";
    import { env } from "./lib/env";

    console.log(`Server running on http://localhost:${env.PORT}`);
    serve({ fetch: app.fetch, port: env.PORT });

  src/app.ts: |
    import { Hono } from "hono";
    import { cors } from "hono/cors";
    import { logger } from "hono/logger";
    import { healthRoute } from "./routes/health";

    export const app = new Hono();

    app.use("*", logger());
    app.use("*", cors({
      origin: process.env.CORS_ORIGIN || "http://localhost:3000",
      allowMethods: ["GET", "POST", "PUT", "DELETE", "PATCH"],
      allowHeaders: ["Content-Type", "Authorization"],
    }));

    app.route("/health", healthRoute);

  src/routes/health.ts: |
    import { Hono } from "hono";

    export const healthRoute = new Hono();

    healthRoute.get("/", (c) => {
      return c.json({ success: true, data: { status: "ok" }, error: null });
    });

  openapi.yaml: |
    openapi: "3.1.0"
    info:
      title: API Service
      version: "0.1.0"
    servers:
      - url: http://localhost:3000
    paths:
      /health:
        get:
          summary: Health check
          responses:
            "200":
              description: Service is healthy
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/HealthResponse"
    components:
      schemas:
        ApiResponse:
          type: object
          properties:
            success:
              type: boolean
            data:
              type:
                - object
                - "null"
            error:
              type:
                - string
                - "null"
            meta:
              type: object
        HealthResponse:
          allOf:
            - $ref: "#/components/schemas/ApiResponse"
            - type: object
              properties:
                data:
                  type: object
                  properties:
                    status:
                      type: string
                      enum: [ok]

  src/db/schema.ts: |
    // Define your Drizzle ORM schema here
    // import { pgTable, text, timestamp, uuid } from "drizzle-orm/pg-core";

  src/db/index.ts: |
    import { drizzle } from "drizzle-orm/postgres-js";
    import postgres from "postgres";
    import { env } from "../lib/env";

    const client = postgres(env.DATABASE_URL);
    export const db = drizzle(client);

  src/types/api.ts: |
    // Standard API response envelope
    export interface ApiResponse<T> {
      success: boolean;
      data: T | null;
      error: string | null;
      meta?: Record<string, unknown>;
    }

  src/__tests__/health.test.ts: |
    import { describe, it, expect } from "vitest";
    import { app } from "../app";

    describe("GET /health", () => {
      it("returns ok status", async () => {
        const res = await app.request("/health");
        expect(res.status).toBe(200);
        const body = await res.json();
        expect(body.success).toBe(true);
        expect(body.data.status).toBe("ok");
      });
    });

  drizzle.config.ts: |
    import { defineConfig } from "drizzle-kit";
    import { env } from "./src/lib/env";

    export default defineConfig({
      schema: "./src/db/schema.ts",
      out: "./drizzle",
      dialect: "postgresql",
      dbCredentials: {
        url: env.DATABASE_URL,
      },
    });

  Dockerfile: |
    FROM node:22-alpine AS builder
    RUN corepack enable && corepack prepare pnpm@9 --activate
    WORKDIR /app
    COPY package.json pnpm-lock.yaml ./
    RUN pnpm install --frozen-lockfile
    COPY . .
    RUN pnpm build

    FROM node:22-alpine
    RUN corepack enable && corepack prepare pnpm@9 --activate
    WORKDIR /app
    COPY --from=builder /app/dist ./dist
    COPY --from=builder /app/package.json /app/pnpm-lock.yaml ./
    RUN pnpm install --frozen-lockfile --prod
    EXPOSE 3000
    CMD ["node", "dist/index.js"]

commands:
  dev: "pnpm exec tsx watch src/index.ts"
  test: "pnpm exec vitest run"
  build: "pnpm exec tsc"
  lint: "pnpm exec eslint src/"
  typecheck: "pnpm exec tsc --noEmit"
  format: "pnpm exec prettier --write ."
  db_generate: "pnpm exec drizzle-kit generate"
  db_migrate: "pnpm exec drizzle-kit migrate"

package_json_scripts:
  dev: "tsx watch src/index.ts"
  build: "tsc"
  test: "vitest run"
  lint: "eslint src/"
  typecheck: "tsc --noEmit"

env_example: |
  PORT=3000
  DATABASE_URL=postgresql://user:password@localhost:5432/dbname
  CORS_ORIGIN=http://localhost:3000

gitignore_extra: |
  dist/

claude_md: |
  # CLAUDE.md

  ## Project
  - Stack: Hono + TypeScript + Drizzle ORM + PostgreSQL
  - Architecture: Route → Service → Repository → Database

  ## Commands
  - Dev: `pnpm exec tsx watch src/index.ts`
  - Test: `pnpm exec vitest run`
  - Build: `pnpm exec tsc`
  - Lint: `pnpm exec eslint src/`
  - Typecheck: `pnpm exec tsc --noEmit`
  - DB Generate: `pnpm exec drizzle-kit generate`
  - DB Migrate: `pnpm exec drizzle-kit migrate`

  ## Architecture
  - `src/routes/` — Hono route handlers (thin — delegate to services)
  - `src/services/` — business logic (testable, no HTTP awareness)
  - `src/repositories/` — database queries via Drizzle ORM
  - `src/middleware/` — auth, validation, error handling
  - `src/db/` — Drizzle schema and connection
  - `src/types/` — shared TypeScript types

  ## Conventions
  - All API responses use envelope: `{ success, data, error, meta }`
  - Validate input at route level with Zod before passing to services
  - Parameterized queries only (Drizzle handles this)
  - NEVER use `any` type

agents_md: |
  # AGENTS.md

  ## Stack
  - Framework: Hono (lightweight, Web Standards-based)
  - Language: TypeScript (strict)
  - ORM: Drizzle (type-safe, SQL-like)
  - Database: PostgreSQL
  - Testing: Vitest

  ## Patterns & Conventions
  - Route → Service → Repository layering
  - All responses use { success, data, error } envelope
  - Input validation with Zod at the route level
  - Hono's `app.request()` for testing routes without HTTP server

  ## Gotchas
  - Hono's `c.json()` sets Content-Type automatically — don't set it manually
  - Drizzle migrations: run `drizzle-kit generate` then `drizzle-kit migrate`
  - `postgres` package (not `pg`) for Drizzle's postgres-js driver

  ## Resolved Issues
