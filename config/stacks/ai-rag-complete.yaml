ci_files:
  ".github/workflows/ci.yml":
    content: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        check:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                node-version-file: '.nvmrc'
                cache: 'pnpm'
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm typecheck
            - run: pnpm test -- --run
            - run: pnpm build
  ".devcontainer/devcontainer.json":
    content: |
      {
        "name": "Dev Container",
        "image": "mcr.microsoft.com/devcontainers/typescript-node:22",
        "features": {
          "ghcr.io/devcontainers/features/github-cli:1": {}
        },
        "postCreateCommand": "pnpm install",
        "customizations": {
          "vscode": {
            "extensions": ["dbaeumer.vscode-eslint", "esbenp.prettier-vscode"]
          }
        }
      }

claude_md: |
  # CLAUDE.md

  ## Project
  - Stack: Next.js 15 + Vercel AI SDK v4 + multi-provider + pgvector RAG + Upstash rate limiting
  - AI: OpenAI (gpt-4o) and Anthropic (claude-sonnet-4-5) — switchable per request
  - Embeddings: OpenAI text-embedding-3-small (1536 dimensions)
  - Vector store: Supabase pgvector
  - Rate limiting: Upstash Redis sliding window

  ## Commands
  - Dev: `pnpm exec next dev`
  - Test: `pnpm exec vitest run`
  - Build: `pnpm exec next build`
  - Lint: `pnpm exec next lint`
  - Typecheck: `pnpm exec tsc --noEmit`

  ## Architecture
  - `src/app/api/chat/` — streaming chat with tool calling and RAG (POST)
  - `src/app/api/ingest/` — document ingestion endpoint (POST)
  - `src/app/(chat)/` — chat UI pages
  - `src/components/chat/` — ChatInterface with provider switcher
  - `src/lib/ai-providers.ts` — getModel() factory, MODELS map, embeddingModel
  - `src/lib/rate-limit.ts` — Upstash rate limiters (chat, ingest)
  - `src/services/ingestion.ts` — chunkText(), ingestDocument()
  - `src/services/retrieval.ts` — semanticSearch() via pgvector RPC
  - `src/lib/supabase/` — server and client Supabase clients

  ## Conventions
  - Streaming routes return result.toUIMessageStreamResponse() directly (no envelope)
  - All other API responses use envelope: `{ success, data, error, meta }`
  - Provider is passed in the request body — never inferred from headers
  - NEVER use `any` type

  ## Supabase Schema Notes
  - documents: id (uuid), content (text), embedding (vector(1536)), metadata (jsonb), created_at (timestamptz)
  - Enable pgvector: CREATE EXTENSION IF NOT EXISTS vector;
  - Create ivfflat index for fast ANN search
  - Create match_documents RPC (see src/services/retrieval.ts for full SQL)

agents_md: |
  # AGENTS.md

  ## Stack
  - Framework: Next.js 15 (App Router)
  - AI SDK: Vercel AI SDK v4 (@ai-sdk/openai, @ai-sdk/anthropic, @ai-sdk/react)
  - Providers: OpenAI (gpt-4o / gpt-4o-mini) + Anthropic (claude-sonnet-4-5 / claude-haiku-3-5)
  - Vector DB: Supabase pgvector
  - Embeddings: OpenAI text-embedding-3-small (1536 dims)
  - Rate limiting: Upstash Redis (@upstash/ratelimit)
  - Testing: Vitest

  ## Patterns & Conventions
  - getModel(provider, tier) returns the correct LanguageModel for any provider/tier combo
  - Chat route does two-phase RAG: pre-retrieve for system prompt + expose retrieve_context tool for follow-ups
  - maxSteps = 3 allows model to call retrieve_context and generate in one request
  - Ingestion pipeline: chunkText (1000 chars, 200 overlap) → embed → batch insert to Supabase
  - Rate limiting applied at route level using IP (swap for user ID when auth is added)

  ## Gotchas
  - Embedding dimensions MUST match the model AND the pgvector column definition
    text-embedding-3-small → 1536 dims | text-embedding-3-large → 3072 dims
    Switching models requires dropping and re-creating the embedding column
  - maxDuration = 30 is required on streaming route handlers (Vercel limit)
  - useChat is from @ai-sdk/react, NOT "ai" — different import path
  - pgvector extension must be enabled in Supabase before creating vector columns
  - match_documents RPC must be created in Supabase SQL editor (see retrieval.ts for SQL)
  - Upstash free tier: 10k requests/day — monitor usage before scaling
  - Tool type in Vercel AI SDK v4 is imported from "ai", not "@ai-sdk/core"
  - convertToModelMessages is required to transform UIMessage[] for the model

  ## Resolved Issues
