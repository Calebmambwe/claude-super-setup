  # ─── Drizzle ORM ─────────────────────────────────────────────────────────────

  db/schema.ts: |
    import { pgTable, text, timestamp, uuid } from "drizzle-orm/pg-core";

    export const users = pgTable("users", {
      id: uuid("id").defaultRandom().primaryKey(),
      email: text("email").notNull().unique(),
      name: text("name"),
      role: text("role", { enum: ["admin", "member", "viewer"] })
        .notNull()
        .default("member"),
      clerkId: text("clerk_id").notNull().unique(),
      createdAt: timestamp("created_at", { withTimezone: true }).defaultNow().notNull(),
      updatedAt: timestamp("updated_at", { withTimezone: true }).defaultNow().notNull(),
    });

    export type User = typeof users.$inferSelect;
    export type NewUser = typeof users.$inferInsert;

  db/index.ts: |
    import { neon } from "@neondatabase/serverless";
    import { drizzle } from "drizzle-orm/neon-http";
    import * as schema from "./schema";

    if (!process.env.DATABASE_URL) {
      throw new Error("DATABASE_URL environment variable is not set");
    }

    const sql = neon(process.env.DATABASE_URL);
    export const db = drizzle(sql, { schema });

  drizzle.config.ts: |
    import type { Config } from "drizzle-kit";

    export default {
      schema: "./db/schema.ts",
      out: "./drizzle",
      dialect: "postgresql",
      dbCredentials: {
        url: process.env.DATABASE_URL!,
      },
    } satisfies Config;

  # ─── Stripe Actions ───────────────────────────────────────────────────────────

  src/actions/billing.ts: |
    "use server";
    import { auth } from "@clerk/nextjs/server";
    import { stripe } from "@/lib/stripe";
    import { env } from "@/lib/env";
    import { db } from "../../db";
    import { users } from "../../db/schema";
    import { eq } from "drizzle-orm";
    import { redirect } from "next/navigation";

    export async function createCheckoutSession(priceId: string): Promise<void> {
      const { userId } = await auth();
      if (!userId) throw new Error("Unauthorized");

      const [user] = await db
        .select()
        .from(users)
        .where(eq(users.clerkId, userId))
        .limit(1);

      if (!user) throw new Error("User not found");

      // Customers should already exist via Stripe webhook (customer.created).
      // As a fallback, create a new customer here.
      let customerId = (user as unknown as { stripeCustomerId?: string }).stripeCustomerId;
      if (!customerId) {
        const customer = await stripe.customers.create({ email: user.email });
        customerId = customer.id;
      }

      const session = await stripe.checkout.sessions.create({
        customer: customerId,
        payment_method_types: ["card"],
        line_items: [{ price: priceId, quantity: 1 }],
        mode: "subscription",
        success_url: `${env.NEXT_PUBLIC_APP_URL}/dashboard?checkout=success`,
        cancel_url: `${env.NEXT_PUBLIC_APP_URL}/dashboard/billing`,
      });

      redirect(session.url!);
    }

    export async function createPortalSession(): Promise<void> {
      const { userId } = await auth();
      if (!userId) throw new Error("Unauthorized");

      const [user] = await db
        .select()
        .from(users)
        .where(eq(users.clerkId, userId))
        .limit(1);

      const customerId = (user as unknown as { stripeCustomerId?: string }).stripeCustomerId;
      if (!customerId) throw new Error("No billing account found");

      const session = await stripe.billingPortal.sessions.create({
        customer: customerId,
        return_url: `${env.NEXT_PUBLIC_APP_URL}/dashboard/billing`,
      });

      redirect(session.url);
    }

