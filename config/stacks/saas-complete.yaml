  # ─── Core lib files ───────────────────────────────────────────────────────────

  src/lib/env.ts: |
    import { z } from "zod";

    const envSchema = z.object({
      // Clerk
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: z.string().startsWith("pk_"),
      CLERK_SECRET_KEY: z.string().startsWith("sk_"),
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: z.string().default("/sign-in"),
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: z.string().default("/sign-up"),
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: z.string().default("/dashboard"),
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: z.string().default("/dashboard"),
      // Database (Neon + Drizzle)
      DATABASE_URL: z.string().url(),
      // Supabase (optional — for teams using Supabase for data)
      NEXT_PUBLIC_SUPABASE_URL: z.string().url().optional(),
      NEXT_PUBLIC_SUPABASE_ANON_KEY: z.string().min(1).optional(),
      // Stripe
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: z.string().startsWith("pk_"),
      STRIPE_SECRET_KEY: z.string().startsWith("sk_"),
      STRIPE_WEBHOOK_SECRET: z.string().startsWith("whsec_"),
      // Email
      RESEND_API_KEY: z.string().startsWith("re_"),
      // App
      NEXT_PUBLIC_APP_URL: z.string().url(),
    });

    export const env = envSchema.parse(process.env);

  src/lib/supabase/server.ts: |
    import { createServerClient } from "@supabase/ssr";
    import { cookies } from "next/headers";

    export async function createClient() {
      const cookieStore = await cookies();
      return createServerClient(
        process.env.NEXT_PUBLIC_SUPABASE_URL!,
        process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY!,
        {
          cookies: {
            getAll() { return cookieStore.getAll(); },
            setAll(cookiesToSet) {
              try {
                cookiesToSet.forEach(({ name, value, options }) =>
                  cookieStore.set(name, value, options)
                );
              } catch {}
            },
          },
        }
      );
    }

  src/lib/supabase/client.ts: |
    import { createBrowserClient } from "@supabase/ssr";

    export function createClient() {
      return createBrowserClient(
        process.env.NEXT_PUBLIC_SUPABASE_URL!,
        process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY!
      );
    }

  src/lib/stripe.ts: |
    import Stripe from "stripe";
    import { env } from "./env";

    export const stripe = new Stripe(env.STRIPE_SECRET_KEY, {
      apiVersion: "2025-01-27.acacia",
      typescript: true,
    });

    // Create a checkout session for a subscription price.
    export async function createCheckoutSession({
      customerId,
      priceId,
      successUrl,
      cancelUrl,
    }: {
      customerId: string;
      priceId: string;
      successUrl: string;
      cancelUrl: string;
    }) {
      return stripe.checkout.sessions.create({
        customer: customerId,
        payment_method_types: ["card"],
        line_items: [{ price: priceId, quantity: 1 }],
        mode: "subscription",
        success_url: successUrl,
        cancel_url: cancelUrl,
      });
    }

    // Create a billing portal session so customers can manage their subscription.
    export async function createPortalSession({
      customerId,
      returnUrl,
    }: {
      customerId: string;
      returnUrl: string;
    }) {
      return stripe.billingPortal.sessions.create({
        customer: customerId,
        return_url: returnUrl,
      });
    }

  src/lib/resend.ts: |
    import { Resend } from "resend";
    import { env } from "./env";

    export const resend = new Resend(env.RESEND_API_KEY);

    export async function sendWelcomeEmail(to: string, name: string) {
      return resend.emails.send({
        from: "no-reply@yourdomain.com",
        to,
        subject: "Welcome!",
        html: `<p>Hi ${name}, welcome aboard.</p>`,
      });
    }

    export async function sendInviteEmail(to: string, inviteUrl: string) {
      return resend.emails.send({
        from: "no-reply@yourdomain.com",
        to,
        subject: "You've been invited",
        html: `<p>You've been invited to join. <a href="${inviteUrl}">Accept invite</a></p>`,
      });
    }

  src/types/roles.ts: |
    // Role enum — single source of truth for RBAC.
    // Add new roles here; update the permission matrix below accordingly.
    export const ROLES = ["admin", "member", "viewer"] as const;
    export type Role = (typeof ROLES)[number];

    // Permission matrix: maps each role to a list of allowed actions.
    // Extend with your domain-specific permissions.
    export const PERMISSIONS: Record<Role, string[]> = {
      admin: [
        "users:read",
        "users:write",
        "users:delete",
        "billing:read",
        "billing:write",
        "org:read",
        "org:write",
        "usage:read",
      ],
      member: [
        "users:read",
        "billing:read",
        "org:read",
        "usage:read",
      ],
      viewer: [
        "users:read",
        "org:read",
        "usage:read",
      ],
    };

    export function hasPermission(role: Role, permission: string): boolean {
      return PERMISSIONS[role]?.includes(permission) ?? false;
    }

    export function isAdmin(role: Role): boolean {
      return role === "admin";
    }

  src/types/api.ts: |
    export interface ApiResponse<T> {
      success: boolean;
      data: T | null;
      error: string | null;
      meta?: Record<string, unknown>;
    }

    export function ok<T>(data: T, meta?: Record<string, unknown>): ApiResponse<T> {
      return { success: true, data, error: null, meta };
    }

    export function err(error: string): ApiResponse<null> {
      return { success: false, data: null, error };
    }

  src/middleware.ts: |
    import { type NextRequest, NextResponse } from "next/server";
    import { createServerClient } from "@supabase/ssr";

    // Routes that do NOT require authentication.
    const PUBLIC_ROUTES = ["/", "/login", "/signup", "/auth/callback", "/api/webhooks/stripe"];
    // Routes that require the admin role specifically.
    const ADMIN_ROUTES = ["/admin"];

    export async function middleware(req: NextRequest) {
      const { pathname } = req.nextUrl;

      // Skip auth check for public routes.
      if (PUBLIC_ROUTES.some((r) => pathname.startsWith(r))) {
        return NextResponse.next();
      }

      let response = NextResponse.next({
        request: { headers: req.headers },
      });

      const supabase = createServerClient(
        process.env.NEXT_PUBLIC_SUPABASE_URL!,
        process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY!,
        {
          cookies: {
            getAll() { return req.cookies.getAll(); },
            setAll(cookiesToSet) {
              cookiesToSet.forEach(({ name, value }) => req.cookies.set(name, value));
              response = NextResponse.next({ request: req });
              cookiesToSet.forEach(({ name, value, options }) =>
                response.cookies.set(name, value, options)
              );
            },
          },
        }
      );

      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        const loginUrl = req.nextUrl.clone();
        loginUrl.pathname = "/login";
        loginUrl.searchParams.set("next", pathname);
        return NextResponse.redirect(loginUrl);
      }

      // RBAC check for admin routes.
      if (ADMIN_ROUTES.some((r) => pathname.startsWith(r))) {
        const { data: profile } = await supabase
          .from("profiles")
          .select("role")
          .eq("id", user.id)
          .single();

        if (profile?.role !== "admin") {
          return NextResponse.redirect(new URL("/dashboard", req.url));
        }
      }

      return response;
    }

    export const config = {
      matcher: ["/((?!_next/static|_next/image|favicon.ico).*)"],
    };

  src/app/(dashboard)/layout.tsx: |
    import { createClient } from "@/lib/supabase/server";
    import { redirect } from "next/navigation";

    export default async function DashboardLayout({
      children,
    }: {
      children: React.ReactNode;
    }) {
      const supabase = await createClient();
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) redirect("/login");

      return (
        <div className="flex min-h-screen">
          <aside className="w-64 border-r bg-gray-50 px-4 py-6">
            <nav className="space-y-1">
              <a href="/dashboard" className="block rounded-lg px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">
                Dashboard
              </a>
              <a href="/dashboard/settings" className="block rounded-lg px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">
                Settings
              </a>
              <a href="/dashboard/billing" className="block rounded-lg px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">
                Billing
              </a>
            </nav>
          </aside>
          <main className="flex-1">{children}</main>
        </div>
      );
    }

  src/app/(dashboard)/dashboard/page.tsx: |
    import { createClient } from "@/lib/supabase/server";
    import { redirect } from "next/navigation";

    export default async function DashboardPage() {
      const supabase = await createClient();
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) redirect("/login");

      const { data: profile } = await supabase
        .from("profiles")
        .select("full_name, role, org_id")
        .eq("id", user.id)
        .single();

      return (
        <main className="p-8">
          <h1 className="text-2xl font-bold">Dashboard</h1>
          <p className="mt-2 text-gray-600">
            Welcome, {profile?.full_name ?? user.email}
          </p>
          <p className="mt-1 text-sm text-gray-400">Role: {profile?.role}</p>
        </main>
      );
    }

