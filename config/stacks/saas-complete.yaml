ci_files:
  ".github/workflows/ci.yml":
    content: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        check:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                node-version-file: '.nvmrc'
                cache: 'pnpm'
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm typecheck
            - run: pnpm test -- --run
            - run: pnpm build
