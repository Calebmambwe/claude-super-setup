  src/app/api/stripe/checkout/route.ts: |
    import { type NextRequest, NextResponse } from "next/server";
    import { createClient } from "@/lib/supabase/server";
    import { createCheckoutSession } from "@/lib/stripe";
    import { env } from "@/lib/env";
    import { z } from "zod";
    import { err } from "@/types/api";

    const bodySchema = z.object({
      priceId: z.string().min(1),
    });

    export async function POST(req: NextRequest) {
      const supabase = await createClient();
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return NextResponse.json(err("Unauthorized"), { status: 401 });

      const parsed = bodySchema.safeParse(await req.json());
      if (!parsed.success) return NextResponse.json(err("Invalid body"), { status: 400 });

      const { data: profile } = await supabase
        .from("profiles")
        .select("stripe_customer_id")
        .eq("id", user.id)
        .single();

      const session = await createCheckoutSession({
        customerId: profile?.stripe_customer_id ?? "",
        priceId: parsed.data.priceId,
        successUrl: `${env.NEXT_PUBLIC_APP_URL}/dashboard?checkout=success`,
        cancelUrl: `${env.NEXT_PUBLIC_APP_URL}/dashboard/billing`,
      });

      return NextResponse.json({ url: session.url });
    }

  src/app/api/stripe/portal/route.ts: |
    import { type NextRequest, NextResponse } from "next/server";
    import { createClient } from "@/lib/supabase/server";
    import { createPortalSession } from "@/lib/stripe";
    import { env } from "@/lib/env";
    import { err } from "@/types/api";

    export async function POST(_req: NextRequest) {
      const supabase = await createClient();
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return NextResponse.json(err("Unauthorized"), { status: 401 });

      const { data: profile } = await supabase
        .from("profiles")
        .select("stripe_customer_id")
        .eq("id", user.id)
        .single();

      if (!profile?.stripe_customer_id) {
        return NextResponse.json(err("No billing account found"), { status: 400 });
      }

      const session = await createPortalSession({
        customerId: profile.stripe_customer_id,
        returnUrl: `${env.NEXT_PUBLIC_APP_URL}/dashboard/billing`,
      });

      return NextResponse.json({ url: session.url });
    }

  src/app/api/webhooks/stripe/route.ts: |
    import { type NextRequest, NextResponse } from "next/server";
    import { stripe } from "@/lib/stripe";
    import { env } from "@/lib/env";

    // SECURITY: Stripe webhook signature verification is critical.
    // Never skip verifyWebhook — it prevents replay attacks and forged events.
    export async function POST(req: NextRequest) {
      const body = await req.text();
      const signature = req.headers.get("stripe-signature");

      if (!signature) {
        return NextResponse.json({ error: "No signature" }, { status: 400 });
      }

      let event;
      try {
        event = stripe.webhooks.constructEvent(body, signature, env.STRIPE_WEBHOOK_SECRET);
      } catch (err) {
        console.error("Webhook signature verification failed:", err);
        return NextResponse.json({ error: "Invalid signature" }, { status: 400 });
      }

      switch (event.type) {
        case "checkout.session.completed": {
          const session = event.data.object;
          // TODO: provision access — update profiles.subscription_status for session.customer
          console.log("Checkout completed:", session.id);
          break;
        }
        case "customer.subscription.updated": {
          const subscription = event.data.object;
          // TODO: sync subscription status and current_period_end to profiles
          console.log("Subscription updated:", subscription.id);
          break;
        }
        case "customer.subscription.deleted": {
          const subscription = event.data.object;
          // TODO: revoke access — downgrade profiles.subscription_status to "free"
          console.log("Subscription cancelled:", subscription.id);
          break;
        }
        case "invoice.payment_failed": {
          const invoice = event.data.object;
          // TODO: send payment failed email via Resend
          console.log("Payment failed:", invoice.id);
          break;
        }
        default:
          console.log("Unhandled event type:", event.type);
      }

      return NextResponse.json({ received: true });
    }

  src/services/usage.ts: |
    import { createClient } from "@/lib/supabase/server";

    // Usage metering pattern.
    // Call trackUsage() from any API route that consumes a metered resource.
    // Query getUsage() to enforce limits or display usage dashboards.

    export async function trackUsage(
      userId: string,
      metric: string,
      quantity = 1
    ): Promise<void> {
      const supabase = await createClient();
      const { error } = await supabase.from("usage_events").insert({
        user_id: userId,
        metric,
        quantity,
        recorded_at: new Date().toISOString(),
      });
      if (error) console.error("Failed to track usage:", error.message);
    }

    export async function getUsage(
      userId: string,
      metric: string,
      since: Date
    ): Promise<number> {
      const supabase = await createClient();
      const { data, error } = await supabase
        .from("usage_events")
        .select("quantity")
        .eq("user_id", userId)
        .eq("metric", metric)
        .gte("recorded_at", since.toISOString());

      if (error) throw new Error(error.message);
      return (data ?? []).reduce((sum, row) => sum + (row.quantity as number), 0);
    }

  src/components/billing/PricingCard.tsx: |
    "use client";
    import { useState } from "react";

    interface PricingCardProps {
      name: string;
      price: number;
      description: string;
      features: string[];
      priceId: string;
      isPopular?: boolean;
    }

    export function PricingCard({ name, price, description, features, priceId, isPopular = false }: PricingCardProps) {
      const [isLoading, setIsLoading] = useState(false);

      async function handleSubscribe() {
        setIsLoading(true);
        try {
          const res = await fetch("/api/stripe/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ priceId }),
          });
          const data = await res.json() as { url?: string };
          if (data.url) window.location.href = data.url;
        } finally {
          setIsLoading(false);
        }
      }

      return (
        <div className={`rounded-2xl border p-8 ${isPopular ? "border-blue-600 shadow-lg" : "border-gray-200"}`}>
          {isPopular && (
            <span className="mb-4 inline-block rounded-full bg-blue-600 px-3 py-1 text-xs font-semibold text-white">
              Most Popular
            </span>
          )}
          <h3 className="text-xl font-bold text-gray-900">{name}</h3>
          <p className="mt-1 text-sm text-gray-500">{description}</p>
          <p className="mt-4 text-4xl font-bold text-gray-900">
            ${price}<span className="text-base font-normal text-gray-500">/mo</span>
          </p>
          <ul className="mt-6 space-y-3">
            {features.map((f) => (
              <li key={f} className="flex items-center gap-2 text-sm text-gray-700">
                <span className="text-green-500">&#10003;</span> {f}
              </li>
            ))}
          </ul>
          <button
            onClick={handleSubscribe}
            disabled={isLoading}
            className={`mt-8 w-full rounded-lg py-3 font-semibold transition ${
              isPopular
                ? "bg-blue-600 text-white hover:bg-blue-700"
                : "border border-gray-300 text-gray-900 hover:bg-gray-50"
            } disabled:opacity-50`}
          >
            {isLoading ? "Redirecting..." : "Get started"}
          </button>
        </div>
      );
    }

  src/__tests__/smoke.test.ts: |
    import { describe, it, expect } from "vitest";

    describe("Smoke test", () => {
      it("should pass", () => {
        expect(true).toBe(true);
      });
    });

  src/__tests__/roles.test.ts: |
    import { describe, it, expect } from "vitest";
    import { hasPermission, isAdmin } from "@/types/roles";

    describe("RBAC", () => {
      it("admin has all permissions", () => {
        expect(hasPermission("admin", "users:delete")).toBe(true);
        expect(hasPermission("admin", "billing:write")).toBe(true);
      });

      it("viewer cannot write", () => {
        expect(hasPermission("viewer", "users:write")).toBe(false);
        expect(hasPermission("viewer", "billing:write")).toBe(false);
      });

      it("member can read but not delete", () => {
        expect(hasPermission("member", "users:read")).toBe(true);
        expect(hasPermission("member", "users:delete")).toBe(false);
      });

      it("isAdmin only true for admin role", () => {
        expect(isAdmin("admin")).toBe(true);
        expect(isAdmin("member")).toBe(false);
        expect(isAdmin("viewer")).toBe(false);
      });
    });

