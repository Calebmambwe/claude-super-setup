    import { createClient } from "@/lib/supabase/server";
    import { redirect } from "next/navigation";

    // Admin layout with server-side role guard.
    // Middleware also enforces this — defence in depth.
    export default async function AdminLayout({
      children,
    }: {
      children: React.ReactNode;
    }) {
      const supabase = await createClient();
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) redirect("/login");

      const { data: profile } = await supabase
        .from("profiles")
        .select("role")
        .eq("id", user.id)
        .single();

      if (profile?.role !== "admin") redirect("/dashboard");

      return (
        <div className="flex min-h-screen">
          <aside className="w-64 border-r bg-gray-900 px-4 py-6">
            <p className="mb-6 text-xs font-semibold uppercase tracking-wider text-gray-400">
