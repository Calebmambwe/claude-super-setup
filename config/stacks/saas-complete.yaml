# SaaS Complete Stack Template
# Next.js 15 + Clerk Auth + Drizzle ORM + Neon + Stripe + Resend + shadcn/ui + RBAC + Teams + Admin
# Also ships Supabase client utilities for teams that prefer Supabase for data.

name: saas-complete
description: "Next.js 15 + Clerk Auth + Drizzle ORM (Neon) + Stripe + Resend + shadcn/ui + RBAC + Teams + Admin dashboard"
short_label: "saas-complete"

init_commands:
  - "pnpm create next-app@latest . --typescript --tailwind --eslint --app --src-dir --import-alias '@/*'"
  - "pnpm add @supabase/supabase-js @supabase/ssr stripe @stripe/stripe-js resend zod"
  - "pnpm add class-variance-authority clsx tailwind-merge lucide-react"
  - "pnpm add @clerk/nextjs"
  - "pnpm add drizzle-orm @neondatabase/serverless"
  - "pnpm add -D drizzle-kit"
  - "pnpm add -D @types/node vitest @vitejs/plugin-react"
  - "pnpm add -D @playwright/test"
  - "pnpm dlx shadcn@latest init --defaults"

directories:
  - src/app/(auth)
  - src/app/(auth)/sign-in/[[...sign-in]]
  - src/app/(auth)/sign-up/[[...sign-up]]
  - src/app/(dashboard)
  - src/app/(admin)
  - src/app/(admin)/users
  - src/app/api/stripe
  - src/app/api/webhooks
  - src/app/api/webhooks/stripe
  - src/components/ui
  - src/components/billing
  - src/components/admin
  - src/lib
  - src/lib/supabase
  - src/services
  - src/types
  - src/actions
  - src/__tests__
  - db
  - e2e

starter_files:
  # ─── Clerk Auth ──────────────────────────────────────────────────────────────

  src/middleware.ts: |
    import { clerkMiddleware, createRouteMatcher } from "@clerk/nextjs/server";
    import { NextResponse } from "next/server";

    // Routes that do NOT require authentication.
    const isPublicRoute = createRouteMatcher([
      "/",
      "/sign-in(.*)",
      "/sign-up(.*)",
      "/api/webhooks(.*)",
    ]);

    // Routes that require the admin role specifically.
    const isAdminRoute = createRouteMatcher(["/admin(.*)"]);

    export default clerkMiddleware(async (auth, req) => {
      if (!isPublicRoute(req)) {
        await auth.protect();
      }

      if (isAdminRoute(req)) {
        const { sessionClaims } = await auth();
        const role = (sessionClaims?.metadata as { role?: string } | undefined)?.role;
        if (role !== "admin") {
          return NextResponse.redirect(new URL("/dashboard", req.url));
        }
      }
    });

    export const config = {
      matcher: [
        "/((?!_next/static|_next/image|favicon.ico).*)",
        "/(api|trpc)(.*)",
      ],
    };

