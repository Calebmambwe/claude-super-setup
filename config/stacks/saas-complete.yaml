claude_md: |
  # CLAUDE.md

  ## Project
  - Stack: Next.js 15 + Supabase Auth + Stripe + Resend + shadcn/ui
  - Auth: Supabase (@supabase/ssr) — email + OAuth (Google, GitHub)
  - Billing: Stripe subscriptions, customer portal, webhook verification
  - Email: Resend (welcome, invite, payment failed)
  - RBAC: Role enum (admin | member | viewer) in src/types/roles.ts
  - Teams: org_id foreign key on profiles table

  ## Commands
  - Dev: `pnpm exec next dev`
  - Test: `pnpm exec vitest run`
  - Build: `pnpm exec next build`
  - Lint: `pnpm exec next lint`
  - Typecheck: `pnpm exec tsc --noEmit`

  ## Architecture
  - `src/app/(auth)/` — login, signup, callback pages
  - `src/app/(dashboard)/` — protected app pages (auth required)
  - `src/app/(admin)/` — admin-only pages (role=admin required)
  - `src/app/api/webhooks/stripe/` — Stripe webhook handler
  - `src/app/api/stripe/checkout/` — checkout session creation
  - `src/app/api/stripe/portal/` — billing portal session
  - `src/components/billing/` — pricing, paywall components
  - `src/services/usage.ts` — usage metering (trackUsage, getUsage)
  - `src/lib/` — Supabase client (server + browser), Stripe, Resend
  - `src/types/roles.ts` — Role enum and permission matrix

  ## Design System (premium-builder skill)
  - ALWAYS read `~/.claude/skills/premium-builder/SKILL.md` before generating UI
  - Use OKLCH design tokens from globals.css — NEVER hardcode hex colors
  - Use premium utilities: glass-card, gradient-text, hero-glow, product-shadow
  - SSR-safe animations: initial={false} for above-fold, whileInView for below-fold
  - Mobile-first: start at 390px, add breakpoints up
  - Touch targets: minimum 44px on all interactive elements

  ## Conventions
  - All API responses use envelope: `{ success, data, error, meta }`
  - Use createClient() from @/lib/supabase/server in Server Components
  - Use createClient() from @/lib/supabase/client in Client Components
  - SECURITY: NEVER skip Stripe webhook signature verification
  - RBAC: always call hasPermission() — never hardcode role string comparisons
  - NEVER use `any` type

  ## Supabase Schema Notes
  - profiles: id (uuid, FK auth.users), full_name, email, role (text), org_id (uuid), stripe_customer_id (text), subscription_status (text)
  - organizations: id, name, created_at
  - usage_events: id, user_id (uuid), metric (text), quantity (int), recorded_at (timestamptz)

agents_md: |
  # AGENTS.md

  ## Stack
  - Framework: Next.js 15 (App Router)
  - Auth: Supabase Auth (@supabase/ssr) — email + OAuth
  - Billing: Stripe (subscriptions, customer portal, webhooks)
  - Email: Resend
  - UI: shadcn/ui + Tailwind CSS
  - RBAC: Role enum — admin | member | viewer
  - Testing: Vitest

  ## Patterns & Conventions
  - Server Components fetch data directly from Supabase server client
  - Client Components use Supabase browser client
  - Route groups: (auth) public, (dashboard) protected, (admin) admin-only
  - Stripe webhook route must be excluded from middleware auth check
  - RBAC enforced at two levels: middleware (fast redirect) + layout (defence in depth)
  - Usage metering: call trackUsage() at API boundaries; query getUsage() to enforce limits

  ## Gotchas
  - Stripe webhook signature verification is security-critical — never bypass
  - Webhook route needs raw body (not parsed JSON) — use req.text() not req.json()
  - Supabase server client requires await cookies() in Next.js 15
  - Set up webhook endpoint in Stripe dashboard (or use stripe CLI for local dev)
    stripe listen --forward-to localhost:3000/api/webhooks/stripe
  - Admin layout has server-side role guard AND middleware guard — both are intentional
  - stripe_customer_id on profiles must be set when user first subscribes (checkout.session.completed)
  - OAuth providers must be enabled in Supabase dashboard → Auth → Providers

  ## Resolved Issues
