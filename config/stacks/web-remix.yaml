      }

agents_md: |
  # AGENTS.md

  ## Stack
  - Framework: Remix (Vite-based, v2)
  - Runtime: Cloudflare Workers (edge, NOT Node.js)
  - Language: TypeScript (strict)
  - Styling: Tailwind CSS
  - Testing: Vitest

  ## Patterns & Conventions
  - Every route file can export: `loader` (GET), `action` (mutations), `meta` (head tags), and a default React component
  - `useLoaderData<typeof loader>()` — typed by the exported `loader` function signature
  - `useActionData<typeof action>()` — typed by the action; returns `undefined` on initial load
  - `<Form method="post">` submits to the current route's action; use `action="/other"` to target another route
  - Zod validation in actions: `safeParse()` → `fail 400 + errors` if invalid, proceed on success

  ## Gotchas
  - Remix uses loader/action pattern, NOT `getServerSideProps` / `getStaticProps` (Next.js). There is no `getServerSideProps` in Remix — data fetching is always in `loader`.
  - Cloudflare Workers runtime does NOT have `process.env`. Environment variables and secrets are in `context.cloudflare.env` (loaders/actions) or `wrangler.toml` [vars]. Never use `process.env` in route code.
  - Local dev secrets go in `.dev.vars` (git-ignored by Wrangler), NOT `.env`. Wrangler reads `.dev.vars` automatically during `wrangler dev`.
  - After form submission, always `return redirect(...)` on success — this prevents the browser from re-submitting on refresh (Post/Redirect/Get pattern).
  - `json()` and `redirect()` are imported from `@remix-run/cloudflare`, NOT `@remix-run/node`. Using the wrong import causes runtime errors on Cloudflare.
  - `useActionData()` is `undefined` on the initial page load (no action has run yet) — always guard: `actionData?.errors?.field`.
  - Remix v2 future flags in `vite.config.ts` prepare for Remix v3 breaking changes. Do not remove them.

  ## Resolved Issues
