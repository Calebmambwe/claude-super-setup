# Web Shadcn v4 Stack Template — Flagship
# Next.js 16 + TypeScript + Tailwind CSS v4 + shadcn/ui CLI v4 (OKLCH) + Accessibility + AI Agent Skills

name: web-shadcn-v4
description: "Next.js 16 + TypeScript + Tailwind CSS v4 (OKLCH tokens) + shadcn/ui CLI v4 + skills + a11y"
short_label: "web-v4"

init_commands:
  - "pnpm create next-app . --typescript --tailwind --eslint --app --src-dir --import-alias '@/*' --yes"
  - "pnpm add zod framer-motion lucide-react next-themes @phosphor-icons/react @tabler/icons-react @formkit/auto-animate"
  - "pnpm add -D vitest @vitejs/plugin-react @testing-library/react @testing-library/jest-dom @testing-library/user-event vitest-axe jsdom prettier prettier-plugin-tailwindcss eslint-plugin-jsx-a11y @next/bundle-analyzer tailwindcss-motion"
  - "pnpm dlx shadcn@latest init -y --base-color neutral"
  - "pnpm dlx skills add shadcn/ui"
  - "pnpm dlx skills add vercel-labs/next-browser"
  - "npx @next/codemod@latest agents-md"

directories:
  - src/app
  - src/components/ui
  - src/components/shared
  - src/components/sections
  - src/lib
  - src/hooks
  - src/types
  - src/actions
  - src/providers
  - src/__tests__

starter_files:
  src/styles/globals.css: |
    @import "tailwindcss";

    @theme {
      --color-primary: oklch(0.208 0.042 265.755);
      --color-primary-foreground: oklch(0.984 0.003 247.858);
      --color-secondary: oklch(0.968 0.007 247.896);
      --color-secondary-foreground: oklch(0.208 0.042 265.755);
      --color-muted: oklch(0.968 0.007 247.896);
      --color-muted-foreground: oklch(0.554 0.046 257.417);
      --color-accent: oklch(0.968 0.007 247.896);
      --color-accent-foreground: oklch(0.208 0.042 265.755);
      --color-destructive: oklch(0.577 0.245 27.325);
      --color-destructive-foreground: oklch(0.984 0.003 247.858);
      --color-background: oklch(1 0 0);
      --color-foreground: oklch(0.145 0.042 265.755);
      --color-card: oklch(1 0 0);
      --color-card-foreground: oklch(0.145 0.042 265.755);
      --color-popover: oklch(1 0 0);
      --color-popover-foreground: oklch(0.145 0.042 265.755);
      --color-border: oklch(0.921 0.013 255.508);
      --color-input: oklch(0.921 0.013 255.508);
      --color-ring: oklch(0.208 0.042 265.755);
      --radius-sm: 0.25rem;
      --radius-md: 0.375rem;
      --radius-lg: 0.5rem;
      --radius-xl: 0.75rem;
    }

    @layer base {
      *,
      *::before,
      *::after {
        border-color: var(--color-border);
      }

      body {
        background-color: var(--color-background);
        color: var(--color-foreground);
      }

      /* Respect user motion preferences */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    }

  src/components/skip-nav.tsx: |
    "use client";

    export function SkipNav() {
      return (
        <a
          href="#main-content"
          className="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50 focus:rounded-md focus:bg-primary focus:px-4 focus:py-2 focus:text-sm focus:font-medium focus:text-primary-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2"
        >
          Skip to main content
        </a>
      );
    }

  next.config.ts: |
    import type { NextConfig } from "next";

    const nextConfig: NextConfig = {
      logging: {
        browserToTerminal: true,
      },
    };

    export default nextConfig;

  src/lib/env.ts: |
    import { z } from "zod";

    const envSchema = z.object({
      NEXT_PUBLIC_APP_URL: z.string().url().optional().default("http://localhost:3000"),
    });

    export const env = envSchema.parse({
      NEXT_PUBLIC_APP_URL: process.env.NEXT_PUBLIC_APP_URL,
    });

  src/lib/animations.ts: |
    export const fadeInUp = {
      hidden: { opacity: 0, y: 20 },
      visible: { opacity: 1, y: 0, transition: { duration: 0.5 } },
    };

    export const fadeInDown = {
      hidden: { opacity: 0, y: -20 },
      visible: { opacity: 1, y: 0, transition: { duration: 0.5 } },
    };

    export const scaleIn = {
      hidden: { opacity: 0, scale: 0.95 },
      visible: { opacity: 1, scale: 1, transition: { duration: 0.4 } },
    };

    export const staggerContainer = {
      hidden: {},
      visible: { transition: { staggerChildren: 0.1 } },
    };

  src/providers/theme-provider.tsx: |
    "use client";

    import { ThemeProvider as NextThemesProvider } from "next-themes";

    export function ThemeProvider({ children }: { children: React.ReactNode }) {
      return (
        <NextThemesProvider attribute="class" defaultTheme="system" enableSystem disableTransitionOnChange>
          {children}
        </NextThemesProvider>
      );
    }

  src/app/layout.tsx: |
    import type { Metadata } from "next";
    import { Inter } from "next/font/google";
    import { ThemeProvider } from "@/providers/theme-provider";
    import { SkipNav } from "@/components/skip-nav";
    import "@/styles/globals.css";

    const inter = Inter({ subsets: ["latin"], variable: "--font-sans" });

    export const metadata: Metadata = {
      title: {
        default: "My App",
        template: "%s | My App",
      },
      description: "Built with Next.js 15 and shadcn/ui",
    };

    export default function RootLayout({
      children,
    }: {
      children: React.ReactNode;
    }) {
      return (
        <html lang="en" suppressHydrationWarning>
          <body className={inter.variable}>
            <ThemeProvider>
              <SkipNav />
              <main id="main-content" tabIndex={-1}>
                {children}
              </main>
            </ThemeProvider>
          </body>
        </html>
      );
    }

  src/app/error.tsx: |
    "use client";

    import { Button } from "@/components/ui/button";

    export default function Error({ error, reset }: { error: Error; reset: () => void }) {
      return (
        <div
          role="alert"
          aria-live="assertive"
          className="flex min-h-[50vh] flex-col items-center justify-center gap-4 text-center"
        >
          <h2 className="text-2xl font-bold">Something went wrong</h2>
          <p className="max-w-md text-muted-foreground">{error.message || "An unexpected error occurred."}</p>
          <Button onClick={reset}>Try again</Button>
        </div>
      );
    }

  src/app/not-found.tsx: |
    import { Button } from "@/components/ui/button";
    import Link from "next/link";

    export default function NotFound() {
      return (
        <div className="flex min-h-[50vh] flex-col items-center justify-center gap-4 text-center">
          <h2 className="text-4xl font-bold">404</h2>
          <p className="max-w-md text-muted-foreground">The page you&apos;re looking for doesn&apos;t exist.</p>
          <Button asChild>
            <Link href="/">Go Home</Link>
          </Button>
        </div>
      );
    }

  src/app/loading.tsx: |
    export default function Loading() {
      return (
        <div aria-label="Loading content" aria-busy="true" className="flex min-h-[50vh] items-center justify-center">
          <div className="w-full max-w-2xl space-y-4 px-4">
            <div className="h-8 w-48 animate-pulse rounded bg-muted/50" />
            <div className="h-4 w-full animate-pulse rounded bg-muted/50" />
            <div className="h-4 w-3/4 animate-pulse rounded bg-muted/50" />
            <div className="mt-8 grid grid-cols-3 gap-4">
              <div className="h-32 animate-pulse rounded-xl bg-muted/50" />
              <div className="h-32 animate-pulse rounded-xl bg-muted/50" />
              <div className="h-32 animate-pulse rounded-xl bg-muted/50" />
            </div>
          </div>
        </div>
      );
    }

  .eslintrc.json: |
    {
      "extends": [
        "next/core-web-vitals",
        "next/typescript",
        "plugin:jsx-a11y/recommended"
      ],
      "plugins": ["jsx-a11y"],
      "rules": {
        "jsx-a11y/anchor-is-valid": "error",
        "jsx-a11y/alt-text": "error",
        "jsx-a11y/aria-role": "error",
        "jsx-a11y/no-autofocus": "warn",
        "jsx-a11y/interactive-supports-focus": "error",
        "jsx-a11y/click-events-have-key-events": "error",
        "jsx-a11y/no-noninteractive-element-interactions": "warn"
      }
    }

  vitest.config.ts: |
    import { defineConfig } from "vitest/config";
    import react from "@vitejs/plugin-react";
    import path from "path";

    export default defineConfig({
      plugins: [react()],
      test: {
        environment: "jsdom",
        setupFiles: ["./src/__tests__/setup.ts"],
        include: ["src/**/*.{test,spec}.{ts,tsx}"],
        coverage: {
          provider: "v8",
          reporter: ["text", "lcov"],
          thresholds: {
            lines: 70,
            functions: 70,
            branches: 70,
            statements: 70,
          },
          exclude: [
            "src/__tests__/**",
            "src/types/**",
            "src/app/**/(layout|page|error|loading|not-found).tsx",
            "**/*.config.*",
          ],
        },
      },
      resolve: {
        alias: {
          "@": path.resolve(__dirname, "./src"),
        },
      },
    });

  prettier.config.js: |
    module.exports = {
      plugins: ["prettier-plugin-tailwindcss"],
    };

  src/__tests__/setup.ts: |
    import "@testing-library/jest-dom/vitest";
    import { expect } from "vitest";
    import { toHaveNoViolations } from "vitest-axe";

    expect.extend(toHaveNoViolations);

  src/__tests__/smoke.test.tsx: |
    import { describe, it, expect } from "vitest";

    describe("Smoke test", () => {
      it("should pass", () => {
        expect(true).toBe(true);
      });
    });

  src/__tests__/skip-nav.test.tsx: |
    import { render, screen } from "@testing-library/react";
    import { describe, it, expect } from "vitest";
    import { axe } from "vitest-axe";
    import { SkipNav } from "@/components/skip-nav";

    describe("SkipNav", () => {
      it("renders a skip navigation link", () => {
        render(<SkipNav />);
        const link = screen.getByRole("link", { name: /skip to main content/i });
        expect(link).toBeInTheDocument();
        expect(link).toHaveAttribute("href", "#main-content");
      });

      it("has no accessibility violations", async () => {
        const { container } = render(<SkipNav />);
        const results = await axe(container);
        expect(results).toHaveNoViolations();
      });
    });

commands:
  dev: "pnpm dev"
  test: "pnpm exec vitest run"
  test_coverage: "pnpm exec vitest run --coverage"
  build: "pnpm build"
  lint: "pnpm lint"
  typecheck: "pnpm exec tsc --noEmit"
  format: "pnpm exec prettier --write ."

package_json_scripts:
  test: "vitest run"
  test:coverage: "vitest run --coverage"
  typecheck: "tsc --noEmit"

env_example: |
  NEXT_PUBLIC_APP_URL=http://localhost:3000

gitignore_extra: |
  .env
  .env*.local
  .vercel
  coverage/

ci_files:
  ".github/workflows/ci.yml":
    content: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        check:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                node-version-file: '.nvmrc'
                cache: 'pnpm'
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm typecheck
            - run: pnpm test -- --run
            - run: pnpm build
  ".devcontainer/devcontainer.json":
    content: |
      {
        "name": "Dev Container",
        "image": "mcr.microsoft.com/devcontainers/typescript-node:22",
        "features": {
          "ghcr.io/devcontainers/features/github-cli:1": {}
        },
        "postCreateCommand": "pnpm install",
        "customizations": {
          "vscode": {
            "extensions": [
              "dbaeumer.vscode-eslint",
              "esbenp.prettier-vscode",
              "bradlc.vscode-tailwindcss",
              "deque-systems.axe-linter"
            ]
          }
        }
      }

claude_md: |
  # CLAUDE.md

  @AGENTS.md

  ## Project
  - Stack: Next.js 16 + TypeScript + Tailwind CSS v4 + shadcn/ui CLI v4 + accessibility-first
  - Design tokens: OKLCH CSS variables via `@theme` in src/styles/globals.css — never hardcode colors
  - Styling: Tailwind v4 CSS-first (`@theme`, `@layer`) — no tailwind.config.js
  - AI Skills: shadcn/skills + next-browser installed — agents have component registry + DevTools context

  ## Commands
  - Dev: `pnpm dev`
  - Test: `pnpm exec vitest run`
  - Test with coverage: `pnpm exec vitest run --coverage`
  - Single test: `pnpm exec vitest run src/__tests__/file.test.tsx`
  - Build: `pnpm build`
  - Lint: `pnpm lint`
  - Typecheck: `pnpm exec tsc --noEmit`

  ## shadcn/ui CLI v4 (Non-Negotiable)
  - ALWAYS run `pnpm dlx shadcn@latest docs <component>` before implementing any shadcn component
  - Use `--dry-run` to preview what a registry addition will do before writing files
  - Use `--diff` to check for registry updates and compare with local changes
  - Use `pnpm dlx shadcn@latest info --json` to get project configuration
  - Use `gap-*` with flex instead of `space-x-*`/`space-y-*`
  - Use `size-*` for equal dimensions instead of separate w-*/h-*
  - Use semantic color tokens (`bg-primary`, `text-muted-foreground`) — never raw Tailwind colors
  - Forms MUST use FieldGroup + Field wrappers with data-invalid + aria-invalid
  - Dialog/Sheet/Drawer MUST have Title for accessibility

  ## Next.js 16 Features
  - Browser log forwarding: client errors appear in terminal (configure via `logging.browserToTerminal` in next.config.ts)
  - Server Fast Refresh: fine-grained server HMR — no full page refreshes for server component changes
  - Dev server lock file: `.next/dev/lock` prevents duplicate dev servers
  - next-browser: AI agent DevTools — `next-browser tree`, `next-browser ppr lock/unlock`, screenshots
  - AGENTS.md: reads bundled docs from `node_modules/next/dist/docs/` — version-matched, no external fetch

  ## Architecture
  - `src/app/` — Next.js App Router pages, layouts, loading.tsx, error.tsx, not-found.tsx
  - `src/components/ui/` — shadcn/ui primitives (do not edit directly — use `shadcn add`/`shadcn diff`)
  - `src/components/shared/` — reusable app components
  - `src/components/sections/` — page sections (hero, features, pricing)
  - `src/components/skip-nav.tsx` — accessibility skip navigation (included in root layout)
  - `src/lib/` — utilities, animations.ts, env.ts
  - `src/providers/` — context providers (theme-provider.tsx)
  - `src/hooks/` — custom React hooks
  - `src/types/` — TypeScript types
  - `src/actions/` — Next.js Server Actions
  - `src/styles/globals.css` — Tailwind v4 @theme tokens (single source of truth for design)

  ## Conventions
  - Server components by default; add "use client" only when needed (state, effects, browser APIs)
  - Use Server Actions for mutations (`src/actions/`), not API routes
  - NEVER use `any` type — use `unknown` + type guard
  - NEVER hardcode colors, spacing, or radius — use OKLCH @theme tokens from globals.css
  - Use Framer Motion for animations (variants in src/lib/animations.ts); wrap in `useReducedMotion` check
  - Use lucide-react for icons — import individually, never barrel import
  - Use next-themes for dark/light mode via src/providers/theme-provider.tsx
  - Use next/image for ALL images — never raw <img> tags
  - Every page must have error.tsx, loading.tsx siblings for error/loading states

  ## Accessibility (Non-Negotiable)
  - SkipNav component MUST remain in root layout pointing to `#main-content`
  - `<main id="main-content">` wraps all page content in the root layout
  - All interactive elements must be keyboard-navigable and have visible focus styles
  - Images must have descriptive alt text — never `alt=""`  unless decorative
  - Use semantic HTML: `<nav>`, `<header>`, `<footer>`, `<section>`, `<article>`, `<aside>`
  - Error states must use `role="alert"` and `aria-live="assertive"`
  - Loading states must use `aria-busy="true"` and `aria-label` describing what is loading
  - Run `vitest-axe` assertions in every component test — see src/__tests__/skip-nav.test.tsx for the pattern
  - eslint-plugin-jsx-a11y is configured in .eslintrc.json — treat a11y lint errors as blocking

agents_md: |
  # AGENTS.md

  <!-- BEGIN:nextjs-agent-rules -->
  # Next.js: ALWAYS read docs before coding
  Before any Next.js work, find and read the relevant doc in `node_modules/next/dist/docs/`. Your training data is outdated — the docs are the source of truth.
  <!-- END:nextjs-agent-rules -->

  ## Stack
  - Framework: Next.js 16 (App Router, Turbopack default, Server Fast Refresh)
  - Language: TypeScript (strict)
  - Styling: Tailwind CSS v4 (CSS-first @theme) + shadcn/ui CLI v4
  - Design tokens: OKLCH via @theme in src/styles/globals.css
  - Testing: Vitest + React Testing Library + vitest-axe
  - Accessibility: eslint-plugin-jsx-a11y + axe assertions in every test
  - AI Skills: shadcn/skills (component registry context) + next-browser (DevTools access)

  ## shadcn/ui CLI v4 Workflow
  - Before implementing: `pnpm dlx shadcn@latest docs <component>` for correct API
  - Before adding: `pnpm dlx shadcn@latest add <component> --dry-run` to preview
  - Check drift: `pnpm dlx shadcn@latest diff` to compare local vs registry
  - Project info: `pnpm dlx shadcn@latest info --json` for config
  - Search: `pnpm dlx shadcn@latest search <query>` to find components

  ## Patterns & Conventions
  - Server components are default; "use client" only for interactivity
  - Use Server Actions for data mutations (`src/actions/`)
  - shadcn/ui components live in src/components/ui/ — don't modify them directly
  - Tailwind v4 uses `@theme` in CSS, not a JS config file — do not create tailwind.config.js
  - OKLCH tokens are the only valid color source — never use hex/rgb values directly
  - Use `gap-*` with flex, `size-*` for equal dimensions, semantic color tokens only

  ## Accessibility Checklist (every PR)
  - [ ] SkipNav renders in layout, points to #main-content
  - [ ] No jsx-a11y lint errors
  - [ ] New components have axe assertions in their tests
  - [ ] Interactive elements keyboard-accessible
  - [ ] Images have meaningful alt text

  ## Gotchas
  - Next.js 16: cookies(), headers(), params, searchParams are all async — must await them
  - Tailwind v4 does not use tailwind.config.js — all customisation lives in @theme in globals.css
  - shadcn/ui CLI v4: use `--base` flag to choose radix or base primitives
  - shadcn/ui forms: MUST use FieldGroup + Field wrappers, not raw input elements
  - vitest-axe must be imported from "vitest-axe" (not "axe-core") and extended in setup.ts
  - `@testing-library/user-event` v14+ is async — always `await userEvent.click(...)` etc.
  - Dev server lock: check `.next/dev/lock` if port conflicts — kill PID listed in it

  ## Resolved Issues
