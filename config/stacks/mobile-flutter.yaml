# Mobile Flutter Stack Template
# Flutter 3 + Dart + Supabase + Riverpod + go_router

name: mobile-flutter
description: "Flutter 3 + Dart + Supabase + Riverpod + go_router"
short_label: "flutter"

init_commands:
  - "flutter create . --org com.example --project-name app --platforms android,ios"
  - "flutter pub add supabase_flutter flutter_riverpod riverpod_annotation go_router"
  - "flutter pub add --dev build_runner riverpod_generator custom_lint riverpod_lint"
  - "dart pub get"

directories:
  - lib/features/home
  - lib/features/auth
  - lib/providers
  - lib/repositories
  - lib/router
  - lib/theme
  - test/unit
  - test/widget

starter_files:
  lib/main.dart: |
    import 'package:flutter/material.dart';
    import 'package:flutter_riverpod/flutter_riverpod.dart';
    import 'package:supabase_flutter/supabase_flutter.dart';
    import 'app.dart';

    Future<void> main() async {
      WidgetsFlutterBinding.ensureInitialized();

      await Supabase.initialize(
        url: const String.fromEnvironment('SUPABASE_URL'),
        anonKey: const String.fromEnvironment('SUPABASE_ANON_KEY'),
      );

      runApp(
        const ProviderScope(
          child: App(),
        ),
      );
    }

  lib/app.dart: |
    import 'package:flutter/material.dart';
    import 'package:flutter_riverpod/flutter_riverpod.dart';
    import 'router/app_router.dart';

    class App extends ConsumerWidget {
      const App({super.key});

      @override
      Widget build(BuildContext context, WidgetRef ref) {
        final router = ref.watch(appRouterProvider);
        return MaterialApp.router(
          title: 'App',
          debugShowCheckedModeBanner: false,
          theme: ThemeData(
            colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue),
            useMaterial3: true,
          ),
          routerConfig: router,
        );
      }
    }

  lib/router/app_router.dart: |
    import 'package:flutter_riverpod/flutter_riverpod.dart';
    import 'package:go_router/go_router.dart';
    import 'package:riverpod_annotation/riverpod_annotation.dart';
    import '../features/home/home_screen.dart';

    part 'app_router.g.dart';

    @riverpod
    GoRouter appRouter(Ref ref) {
      return GoRouter(
        initialLocation: '/',
        routes: [
          GoRoute(
            path: '/',
            builder: (context, state) => const HomeScreen(),
          ),
        ],
      );
    }

  lib/features/home/home_screen.dart: |
    import 'package:flutter/material.dart';
    import 'package:flutter_riverpod/flutter_riverpod.dart';

    class HomeScreen extends ConsumerWidget {
      const HomeScreen({super.key});

      @override
      Widget build(BuildContext context, WidgetRef ref) {
        return Scaffold(
          appBar: AppBar(
            title: const Text('Home'),
            backgroundColor: Theme.of(context).colorScheme.inversePrimary,
          ),
          body: const Center(
            child: Text(
              'Welcome',
              style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold),
            ),
          ),
        );
      }
    }

  lib/providers/supabase_provider.dart: |
    import 'package:flutter_riverpod/flutter_riverpod.dart';
    import 'package:riverpod_annotation/riverpod_annotation.dart';
    import 'package:supabase_flutter/supabase_flutter.dart';

    part 'supabase_provider.g.dart';

    @riverpod
    SupabaseClient supabaseClient(Ref ref) {
      return Supabase.instance.client;
    }

    @riverpod
    Stream<AuthState> authState(Ref ref) {
      return ref.watch(supabaseClientProvider).auth.onAuthStateChange;
    }

  analysis_options.yaml: |
    include: package:flutter_lints/flutter.yaml

    analyzer:
      plugins:
        - custom_lint

    linter:
      rules:
        - prefer_const_constructors
        - prefer_const_widgets
        - avoid_print

  test/unit/smoke_test.dart: |
    import 'package:flutter_test/flutter_test.dart';

    void main() {
      test('smoke test', () {
        expect(true, isTrue);
      });
    }

commands:
  dev: "flutter run"
  test: "flutter test"
  build_apk: "flutter build apk --release"
  build_ipa: "flutter build ipa"
  lint: "flutter analyze"
  format: "dart format lib/ test/"
  typecheck: "flutter analyze"
  codegen: "dart run build_runner build --delete-conflicting-outputs"
  codegen_watch: "dart run build_runner watch --delete-conflicting-outputs"

env_example: |
  # Pass via --dart-define when running
  # flutter run --dart-define=SUPABASE_URL=https://your-project.supabase.co --dart-define=SUPABASE_ANON_KEY=your-anon-key
  SUPABASE_URL=https://your-project.supabase.co
  SUPABASE_ANON_KEY=your-anon-key

gitignore_extra: |
  .dart_tool/
  build/
  *.g.dart
  *.freezed.dart
  ios/Pods/
  android/.gradle/
  android/local.properties

claude_md: |
  # CLAUDE.md

  ## Project
  - Stack: Flutter 3 + Dart + Supabase + Riverpod + go_router
  - State management: Riverpod (code-generated providers with @riverpod annotation)
  - Navigation: go_router (declarative, URL-based)

  ## Commands
  - Dev: `flutter run`
  - Test: `flutter test`
  - Lint: `flutter analyze`
  - Format: `dart format lib/ test/`
  - Build APK: `flutter build apk --release`
  - Build IPA: `flutter build ipa`
  - Codegen: `dart run build_runner build --delete-conflicting-outputs`

  ## Architecture
  - `lib/features/` — feature slices (each has screen + local widgets)
  - `lib/providers/` — Riverpod providers (generated with @riverpod)
  - `lib/repositories/` — Supabase data access
  - `lib/router/` — go_router config
  - `lib/theme/` — ThemeData, color tokens
  - `test/` — unit and widget tests

  ## Conventions
  - All files use snake_case (Dart convention)
  - Use @riverpod annotation and run codegen after adding providers
  - ConsumerWidget for widgets that read providers
  - Supabase secrets passed via --dart-define, not pubspec.yaml
  - NEVER hardcode secrets in source files

agents_md: |
  # AGENTS.md

  ## Stack
  - Framework: Flutter 3 (Dart)
  - State: Riverpod v3 with code generation (@riverpod annotation)
  - Navigation: go_router
  - Backend: Supabase (auth, database, storage)
  - Testing: flutter_test + mockito

  ## Patterns & Conventions
  - Files: snake_case (e.g., home_screen.dart, auth_repository.dart)
  - Providers: annotate with @riverpod, run build_runner to generate .g.dart
  - ProviderScope must wrap the root widget in main()
  - ConsumerWidget (not StatelessWidget) for any widget using ref.watch
  - Supabase initialized in main() before runApp

  ## Gotchas
  - After adding/changing @riverpod providers, always run build_runner codegen
  - Supabase env vars passed via --dart-define at build time (not .env)
  - go_router requires GoRouter inside ProviderScope — use @riverpod provider
  - Part files (*.g.dart) are generated — never edit them manually
  - flutter analyze is the typecheck equivalent (Dart has no separate tsc)

  ## Resolved Issues
