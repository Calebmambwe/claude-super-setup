# Cursor Automation: Cloud Agent Dispatch
# Import this template at cursor.com/automations
#
# Trigger: Manual launch or webhook
# Action: Run full ghost pipeline on Cloud Agent VM

name: "Cloud Agent Ghost Pipeline"
description: "Autonomous feature implementation — plan, build, check, ship on isolated VM"

trigger:
  type: manual
  # Also supports webhook trigger for programmatic dispatch:
  # type: webhook
  # url: https://api.cursor.com/v1/automations/{id}/trigger

instructions: |
  You are running the Ghost Mode pipeline autonomously. Follow these steps precisely.

  ## Step 1: Load Context

  Read the feature description and constraints from the task input.
  If ghost-config.json exists in the repo, load trust level and max_tasks from it.
  Default trust: balanced. Default max_tasks: 10.

  ## Step 2: Resource Audit

  Before planning:
  - Read AGENTS.md if present (project-specific patterns)
  - Search for existing components/patterns to reuse
  - Check for design system rules in .cursor/rules/

  ## Step 3: Plan

  Assess scope and route:
  - Quick Plan (3-10 files): map affected files and dependencies
  - Feature Spec (unclear scope): specify, clarify, plan
  - Full Pipeline (major feature): requirements, architecture, sprint planning

  ## Step 4: Trust Guardrails

  Evaluate the plan against trust level:

  Conservative: Block if Full Pipeline route OR tasks > max_tasks
  Balanced: Block if tasks > max_tasks * 1.5
  Aggressive: Block only if tasks > max_tasks * 2

  If blocked: create a PR with the plan document only, noting "Guardrail blocked — review needed."

  ## Step 5: Decompose and Build

  1. Break plan into dependency-ordered tasks (1-3 files each)
  2. For each task: plan → implement → verify → fix (max 2 fix cycles)
  3. Run tests after each task
  4. Stop after 3 consecutive failures

  ## Step 6: Quality Checks

  After all tasks complete:
  - Run full test suite
  - Run lint and typecheck
  - Check for security issues (no hardcoded secrets, parameterized queries)
  - Verify test coverage >= 80% for new code

  ## Step 7: Ship

  1. Create conventional commit(s)
  2. Push branch
  3. Create PR with:
     - Summary of all changes
     - Test results
     - Any blocked tasks or known issues
     - Link back to the original task/issue

  Rules:
  - Never modify .env files
  - Never skip tests
  - Never use `any` type in TypeScript
  - Follow the design system for UI changes
  - One logical change per commit

mcps:
  - github
  - context7

model: claude-opus-4-6
